<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Don Note">
<meta name="theme-color" content="#FF4785">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<title>돈โนท Don Note ⭐</title>

<style>
:root {
  --pink: #FF4785; --pink-light: #FFF0F5; --teal: #00C9A7; --teal-light: #E8FAF7;
  --bg: #F5F5F5; --white: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93; --border: #E5E5EA; --nav-h: 60px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;padding-bottom:var(--nav-h);}

/* UI Components */
.header{ background:var(--white); padding:12px; padding-top:calc(12px + env(safe-area-inset-top)); text-align:center; font-weight:700; border-bottom:1px solid var(--border); }
.bottom-nav{ position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:var(--white); border-top:1px solid var(--border); display:grid; grid-template-columns:repeat(5,1fr); padding-bottom:env(safe-area-inset-bottom); z-index:100; }
.nav-btn{ background:none; border:none; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:.6rem; color:var(--sub); font-weight:600; }
.nav-btn.active{ color:var(--pink); }
.nav-btn span{ font-size:1.2rem; margin-bottom:2px; }

.panel{ display:none; max-width:480px; margin:0 auto; padding:14px; }
.panel.active{ display:block; }

/* Home Cards */
.balance-wrap{ text-align:center; margin-bottom:20px; padding:20px 0; }
.balance-amount{ font-size:2.5rem; font-weight:900; }
.ie-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px; }
.ie-card{ padding:15px; border-radius:16px; background:var(--white); border:2px solid var(--border); cursor:pointer; }
.ie-card.active.exp-card{ border-color:var(--pink); background:var(--pink-light); }
.ie-card.active.inc-card{ border-color:var(--teal); background:var(--teal-light); }

.bar-track{ height:6px; background:#eee; border-radius:10px; margin-top:5px; overflow:hidden; }
.bar-fill{ height:100%; transition:width 0.5s; }

/* Forms */
.amount-box{ background:#eee; border-radius:15px; padding:15px; display:flex; align-items:center; margin-bottom:15px; }
.amount-box input{ background:none; border:none; outline:none; font-size:2rem; font-weight:800; width:100%; }
.note-field{ width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); margin-bottom:15px; outline:none; }

/* Overlays */
#splash{ position:fixed; inset:0; z-index:9999; background:var(--pink); display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; transition:0.5s; }
#splash.hide{ opacity:0; pointer-events:none; }
.toast{ position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff; padding:8px 16px; border-radius:20px; font-size:.8rem; opacity:0; transition:0.3s; z-index:1000; }
.toast.show{ opacity:1; }
.hidden{ display:none; }
</style>
</head>
<body>

<div id="splash"><h2>🐼 Don Note</h2></div>

<div class="header">돈โนท Don Note ⭐</div>

<div class="panel active" id="panel-home">
  <div class="balance-wrap">
    <div style="font-size:.8rem; color:var(--sub);">เงินคงเหลือ</div>
    <div class="balance-amount" id="balAmount">฿0</div>
  </div>

  <div class="chat-box" style="margin-bottom:15px; display:flex; gap:5px;">
    <input type="text" id="chatIn" class="note-field" style="margin:0;" placeholder="พิมพ์สั้นๆ เช่น 'ข้าว 50'">
    <button onclick="parseChat()" style="background:var(--pink); color:#fff; border:none; padding:0 15px; border-radius:10px;">➤</button>
  </div>

  <div class="ie-grid">
    <div class="ie-card exp-card active" id="ieExp" onclick="switchSumTab('expense')">
      <small>รายจ่าย</small><div id="ieExpAmt" style="font-weight:800; color:var(--pink);">฿0</div>
    </div>
    <div class="ie-card inc-card" id="ieInc" onclick="switchSumTab('income')">
      <small>รายรับ</small><div id="ieIncAmt" style="font-weight:800; color:var(--teal);">฿0</div>
    </div>
  </div>
  <div id="catRows" style="background:#fff; padding:15px; border-radius:15px;"></div>
</div>

<div class="panel" id="panel-add">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:15px;">
    <button id="tabExp" onclick="setAddType('expense')" style="padding:10px; border-radius:10px; border:none;">รายจ่าย</button>
    <button id="tabInc" onclick="setAddType('income')" style="padding:10px; border-radius:10px; border:none;">รายรับ</button>
  </div>
  <div class="amount-box"><span>฿</span><input type="number" id="inputAmt" placeholder="0"></div>
  <div id="catGrid2" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:15px;"></div>
  <input type="text" id="noteField" class="note-field" placeholder="บันทึกช่วยจำ...">
  <button onclick="addEntry()" id="btnAdd" style="width:100%; padding:15px; border-radius:15px; border:none; color:#fff; font-weight:800;">บันทึก ✓</button>
</div>

<div class="panel" id="panel-history">
  <input type="month" id="filterMonth" onchange="renderHistory()" class="note-field">
  <div id="txList2"></div>
</div>

<div class="panel" id="panel-budget">
  <div style="text-align:center; padding:50px 20px;">
    <h3>🥧 ระบบงบประมาณ</h3>
    <p style="color:var(--sub);">กำลังพัฒนาเร็วๆ นี้!</p>
  </div>
</div>

<div class="panel" id="panel-settings">
  <div style="background:#fff; padding:15px; border-radius:15px;">
    <p><b>บัญชี:</b> <span id="userName">Local User</span></p>
    <hr style="margin:10px 0; border:none; border-top:1px solid #eee;">
    <button onclick="localStorage.clear(); location.reload();" style="color:red; border:none; background:none;">🗑️ ล้างข้อมูลทั้งหมด</button>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="goPanel('panel-home')"><span>🏠</span>สรุป</button>
  <button class="nav-btn" id="nav-add" onclick="goPanel('panel-add')"><span>✏️</span>บันทึก</button>
  <button class="nav-btn" id="nav-budget" onclick="goPanel('panel-budget')"><span>🥧</span>งบ</button>
  <button class="nav-btn" id="nav-history" onclick="goPanel('panel-history')"><span>📋</span>รายการ</button>
  <button class="nav-btn" id="nav-settings" onclick="goPanel('panel-settings')"><span>⚙️</span>ตั้งค่า</button>
</nav>

<div class="toast" id="toast"></div>

<script>
const firebaseConfig = { 
    apiKey: "AIzaSyAxEfomFx8g_Du_tdFjU1ji1-Hofno-sv8", 
    authDomain: "don-note-f2bcd.firebaseapp.com", 
    projectId: "don-note-f2bcd", 
    appId: "1:906046825048:web:a415a5bb1f653fcb18202d" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const LIFF_ID = '2009230946-hp9vcPh3';

let userId = null, entries = JSON.parse(localStorage.getItem('dong_entries') || '[]');
let addType = 'expense', selCatId = 'food', sumTab = 'expense';

const EXP_CATS = [{id:'food',icon:'🍜',name:'อาหาร'},{id:'drink',icon:'🧋',name:'กาแฟ'},{id:'travel',icon:'🚌',name:'เดินทาง'},{id:'shop',icon:'🛍️',name:'ช้อป'},{id:'other',icon:'📦',name:'อื่นๆ'}];
const INC_CATS = [{id:'salary',icon:'💼',name:'เงินเดือน'},{id:'special',icon:'⭐',name:'งานเสริม'},{id:'other_i',icon:'💰',name:'อื่นๆ'}];

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      const p = await liff.getProfile();
      userId = p.userId;
      document.getElementById('userName').textContent = p.displayName;
    }
  } catch (e) { userId = 'local'; }
  document.getElementById('splash').classList.add('hide');
  renderAll(); renderCatGrid();
}

function goPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('nav-' + id.split('-')[1]).classList.add('active');
  if(id==='panel-history') renderHistory();
}

function setAddType(t) {
  addType = t;
  document.getElementById('tabExp').style.background = t==='expense'?'var(--pink)':'#ddd';
  document.getElementById('tabInc').style.background = t==='income'?'var(--teal)':'#ddd';
  document.getElementById('btnAdd').style.background = t==='expense'?'var(--pink)':'var(--teal)';
  selCatId = t==='expense'?'food':'salary';
  renderCatGrid();
}

function renderCatGrid() {
  const cats = addType === 'expense' ? EXP_CATS : INC_CATS;
  document.getElementById('catGrid2').innerHTML = cats.map(c => `
    <div onclick="selCatId='${c.id}'; renderCatGrid();" style="padding:10px; border:2px solid ${selCatId===c.id? (addType==='expense'?'var(--pink)':'var(--teal)') : '#eee'}; border-radius:10px; text-align:center; background:#fff;">
      <div>${c.icon}</div><div style="font-size:.6rem;">${c.name}</div>
    </div>
  `).join('');
}

function addEntry() {
  const amt = parseFloat(document.getElementById('inputAmt').value);
  if(!amt) return showToast('ใส่ยอดเงินด้วยนะ!');
  const cat = [...EXP_CATS, ...INC_CATS].find(c => c.id === selCatId);
  entries.push({ id:Date.now(), type:addType, amount:amt, catId:selCatId, catIcon:cat.icon, catName:cat.name, note:document.getElementById('noteField').value || cat.name, date:new Date().toISOString().slice(0,10) });
  save(); goPanel('panel-home'); renderAll();
  document.getElementById('inputAmt').value = ''; document.getElementById('noteField').value = '';
}

function parseChat() {
  const val = document.getElementById('chatIn').value;
  const amt = (val.match(/\d+/) || [])[0];
  if(!amt) return showToast('หาตัวเลขไม่เจอจ้า');
  document.getElementById('inputAmt').value = amt;
  document.getElementById('noteField').value = val;
  setAddType(val.includes('รับ') || val.includes('เงินเดือน') ? 'income' : 'expense');
  addEntry(); document.getElementById('chatIn').value = '';
}

function renderAll() {
  const ym = new Date().toISOString().slice(0,7);
  const cur = entries.filter(e => e.date.startsWith(ym));
  const inc = cur.filter(e => e.type==='income').reduce((s,e)=>s+e.amount,0);
  const exp = cur.filter(e => e.type==='expense').reduce((s,e)=>s+e.amount,0);
  document.getElementById('balAmount').textContent = '฿' + (inc-exp).toLocaleString();
  document.getElementById('ieExpAmt').textContent = '฿' + exp.toLocaleString();
  document.getElementById('ieIncAmt').textContent = '฿' + inc.toLocaleString();
  
  const catMap = {};
  cur.filter(e => e.type === sumTab).forEach(e => catMap[e.catId] = (catMap[e.catId] || 0) + e.amount);
  const cats = sumTab === 'expense' ? EXP_CATS : INC_CATS;
  document.getElementById('catRows').innerHTML = cats.map(c => {
    const a = catMap[c.id] || 0;
    return `<div style="margin-bottom:10px;"><div style="display:flex; justify-content:space-between; font-size:.8rem;"><span>${c.icon} ${c.name}</span><span>฿${a}</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.min(a/10,100)}%; background:${sumTab==='expense'?'var(--pink)':'var(--teal)'};"></div></div></div>`;
  }).join('');
}

function renderHistory() {
  const m = document.getElementById('filterMonth').value || new Date().toISOString().slice(0,7);
  const list = entries.filter(e => e.date.startsWith(m)).reverse();
  document.getElementById('txList2').innerHTML = list.length ? list.map(e => `
    <div style="background:#fff; padding:12px; border-radius:12px; display:flex; align-items:center; gap:10px; margin-bottom:8px;">
      <div style="font-size:1.2rem;">${e.catIcon}</div>
      <div style="flex:1;"><div style="font-weight:700;">${e.note}</div><small style="color:#999;">${e.date}</small></div>
      <div style="font-weight:800; color:${e.type==='expense'?'red':'green'};">${e.type==='expense'?'-':'+'}฿${e.amount}</div>
    </div>`).join('') : '<center>ไม่มีรายการ</center>';
}

function save() {
  localStorage.setItem('dong_entries', JSON.stringify(entries));
  if(userId && userId !== 'local') db.collection('dongNote').doc(userId).set({ entries, updatedAt: new Date() });
}

function showToast(m) {
  const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function switchSumTab(t) {
  sumTab = t;
  document.getElementById('ieExp').classList.toggle('active', t==='expense');
  document.getElementById('ieInc').classList.toggle('active', t==='income');
  renderAll();
}

setAddType('expense');
initLiff();
</script>
</body>
</html>
