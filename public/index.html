<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Don Note">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FF4785">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<title>돈노트 Don Note ⭐</title>

<style>
:root {
  --pink:       #FF4785;
  --pink-light: #FFF0F5;
  --pink-border:#FFADD2;
  --pink-track: #FFD6E7;
  --teal:       #00C9A7;
  --teal-light: #E8FAF7;
  --teal-border:#80E5D8;
  --teal-track: #B2F0E8;
  --bg:         #F5F5F5;
  --white:      #FFFFFF;
  --text:       #1C1C1E;
  --sub:        #8E8E93;
  --border:     #E5E5EA;
  --nav-h:      60px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text','Segoe UI',sans-serif;}
body{padding-bottom:var(--nav-h);}

/* UI Components Core */
.header{ background:var(--white); padding:12px 18px; padding-top:calc(12px + env(safe-area-inset-top)); display:flex; align-items:center; justify-content:center; position:relative; }
.header-title{font-size:1rem;font-weight:700;color:var(--text);}
.header-bear{ position:absolute; left:16px; font-size:1.3rem; cursor:pointer; }
.header-right{position:absolute; right:16px; font-size:.8rem; color:var(--sub);}

.bottom-nav{ position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:var(--white); border-top:1px solid var(--border); display:grid; grid-template-columns:repeat(5,1fr); padding-bottom:env(safe-area-inset-bottom); z-index:100; }
.nav-btn{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; background:none; border:none; cursor:pointer; color:var(--sub); font-size:.58rem; font-weight:600; letter-spacing:.02em; transition:color .2s; }
.nav-btn.active{color:var(--pink);}

.panel{display:none; max-width:480px; margin:0 auto; padding:14px;}
.panel.active{display:block;}

/* Cards & Layout */
.balance-wrap{text-align:center; margin-bottom:14px;}
.balance-amount{font-size:2.6rem; font-weight:900; margin:4px 0 8px;}
.balance-amount.positive{color:#34C759;}
.balance-amount.negative{color:var(--pink);}

.ie-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
.ie-card{ padding:14px; border-radius:16px; border:2px solid var(--border); background:var(--white); cursor:pointer; }
.ie-card.exp-card{background:var(--pink-light);}
.ie-card.inc-card{background:var(--teal-light);}
.ie-card.active.exp-card{border-color:var(--pink);}
.ie-card.active.inc-card{border-color:var(--teal);}

.sum-card{ background:var(--white); border-radius:20px; padding:18px 16px; box-shadow:0 1px 6px rgba(0,0,0,.07); }
.bar-track{height:5px; border-radius:4px; overflow:hidden; margin-top:5px;}
.bar-fill{height:100%; border-radius:4px; transition:width .9s ease;}

/* Forms */
.amount-box{ background:var(--bg); border-radius:16px; padding:16px 18px; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.amount-box input{ flex:1; border:none; background:transparent; outline:none; font-size:2rem; font-weight:900; }
.note-field{ width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:12px; font-size:.9rem; outline:none; margin-bottom:14px; }

/* Overlays & Modals */
.overlay, .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(4px); display:flex; align-items:flex-end; justify-content:center; z-index:500; }
.hidden{display:none;}
.sheet, .modal-sheet{ background:var(--white); border-radius:24px 24px 0 0; width:100%; max-width:480px; padding:20px 20px 28px; }

/* Splash & Toasts */
#splash{ position:fixed; inset:0; z-index:9999; background:#FF4785; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .5s ease; }
#splash.hide{opacity:0; pointer-events:none;}
.toast{ position:fixed; bottom:calc(var(--nav-h) + 16px); left:50%; transform:translateX(-50%); background:#1C1C1E; color:#fff; padding:10px 20px; border-radius:20px; font-size:.85rem; opacity:0; transition:all .3s; z-index:600; }
.toast.show{opacity:1;}
</style>
</head>
<body>

<div id="lineLogin" class="hidden">
  <div class="ll-bear">🐼</div>
  <div class="ll-title">돈โน트 Don Note ⭐</div>
  <div class="ll-sub">เข้าสู่ระบบด้วย LINE<br>ข้อมูลปลอดภัยผูกกับบัญชี LINE ของคุณ</div>
  <button class="btn-line-login" onclick="liff.login()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2e/LINE_New_App_Icon_%282020-12%29.png" alt="LINE" style="width:24px;">
    เข้าสู่ระบบด้วย LINE
  </button>
</div>

<div id="splash">
  <div class="splash-bear" style="font-size:72px;">🐼</div>
  <div class="splash-title" style="color:#fff; font-size:1.5rem; font-weight:800;">돈โน트 Don Note</div>
  <div class="splash-sub" style="color:rgba(255,255,255,0.8);">โน้ตเงินสไตล์เกาหลี ⭐</div>
</div>

<div class="header">
  <div class="header-bear" id="headerBear">🐼</div>
  <div class="header-title">돈โน트 Don Note ⭐</div>
  <div class="header-right" id="headerRight"></div>
</div>

<div class="panel active" id="panel-home">
  <div class="balance-wrap">
    <div style="font-size:.72rem; color:var(--sub); font-weight:700;">เหลือเก็บ</div>
    <div class="balance-amount" id="balAmount">฿0</div>
    <button class="period-btn" onclick="cyclePeriod()" style="border:1px solid var(--border); border-radius:20px; padding:6px 14px; background:#fff;">
      <span id="periodLabel">รอบงบนี้</span> ⇄
    </button>
  </div>

  <div class="chat-box" style="background:#fff; border-radius:16px; padding:14px; margin-bottom:14px; box-shadow:0 1px 4px rgba(0,0,0,0.05);">
    <div style="font-size:.7rem; font-weight:700; color:var(--sub); margin-bottom:8px;">⚡ พิมพ์สั้นๆ เช่น "กาแฟ 65"</div>
    <div style="display:flex; gap:8px;">
      <input class="note-field" id="chatIn" placeholder="กินข้าว 80 / รับเงิน 25000" style="margin:0; flex:1;" inputmode="text" enterkeyhint="send">
      <button onclick="parseChat()" style="padding:0 18px; border:none; border-radius:12px; background:var(--pink); color:#fff; font-weight:700;">➤</button>
    </div>
  </div>

  <div class="ie-grid">
    <div class="ie-card exp-card active" id="ieExp" onclick="switchSumTab('expense')">
      <div style="color:var(--pink); font-size:.72rem; font-weight:700;">รายจ่าย</div>
      <div class="iec-amount" id="ieExpAmt" style="font-size:1.25rem; font-weight:900; color:var(--pink);">฿0.00</div>
    </div>
    <div class="ie-card inc-card" id="ieInc" onclick="switchSumTab('income')">
      <div style="color:var(--teal); font-size:.72rem; font-weight:700;">รายรับ</div>
      <div class="iec-amount" id="ieIncAmt" style="font-size:1.25rem; font-weight:900; color:var(--teal);">฿0.00</div>
    </div>
  </div>

  <div class="sum-card">
    <div id="catRows"></div>
    <button class="btn-manage" onclick="goPanel('panel-budget')" style="width:100%; padding:12px; margin-top:10px; border:1px solid var(--border); border-radius:12px; background:#fff; font-weight:600;">✏️ จัดการหมวดและงบ</button>
  </div>
</div>

<div class="panel" id="panel-add">
  <div class="type-tabs" style="display:grid; grid-template-columns:1fr 1fr; background:var(--bg); padding:4px; border-radius:12px; margin-bottom:16px;">
    <button class="type-tab exp active" id="tabExp" onclick="setAddType('expense')" style="padding:10px; border:none; border-radius:8px; font-weight:700;">รายจ่าย</button>
    <button class="type-tab inc" id="tabInc" onclick="setAddType('income')" style="padding:10px; border:none; border-radius:8px; font-weight:700;">รายรับ</button>
  </div>

  <div class="amount-box">
    <span style="font-size:1.4rem; font-weight:800; color:var(--sub);">฿</span>
    <input type="number" id="inputAmt" placeholder="0" inputmode="decimal">
  </div>

  <div id="catGrid2" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px;"></div>
  <input class="note-field" id="noteField" placeholder="รายละเอียด (ไม่บังคับ)">
  <button class="btn-add exp-btn" id="btnAdd" onclick="addEntry()" style="width:100%; padding:16px; border:none; border-radius:14px; background:var(--pink); color:#fff; font-size:1rem; font-weight:800;">บันทึก ✓</button>
</div>

<div class="panel" id="panel-history">
  <div style="display:flex; gap:8px; margin-bottom:12px;">
    <input type="month" id="filterMonth" onchange="renderHistory()" style="flex:1; padding:8px; border-radius:10px; border:1px solid var(--border);">
    <select id="filterType" onchange="renderHistory()" style="padding:8px; border-radius:10px; border:1px solid var(--border);">
      <option value="all">ทั้งหมด</option>
      <option value="expense">รายจ่าย</option>
      <option value="income">รายรับ</option>
    </select>
  </div>
  <div id="txList2" style="display:flex; flex-direction:column; gap:8px;"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="goPanel('panel-home')"><span>🏠</span>สรุป</button>
  <button class="nav-btn" id="nav-add" onclick="goPanel('panel-add')"><span>✏️</span>บันทึก</button>
  <button class="nav-btn" id="nav-budget" onclick="goPanel('panel-budget')"><span>🥧</span>งบ</button>
  <button class="nav-btn" id="nav-history" onclick="goPanel('panel-history')"><span>📋</span>รายการ</button>
  <button class="nav-btn" id="nav-settings" onclick="goPanel('panel-settings')"><span>⚙️</span>ตั้งค่า</button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ══════ CONFIG & INITIALIZATION ══════
const firebaseConfig = {
  apiKey: "AIzaSyAxEfomFx8g_Du_tdFjU1ji1-Hofno-sv8",
  authDomain: "don-note-f2bcd.firebaseapp.com",
  projectId: "don-note-f2bcd",
  storageBucket: "don-note-f2bcd.firebasestorage.app",
  messagingSenderId: "906046825048",
  appId: "1:906046825048:web:a415a5bb1f653fcb18202d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const LIFF_ID = '2009230946-hp9vcPh3';
let userId = null;
let entries = JSON.parse(localStorage.getItem('dong_entries') || '[]');
let budgets = JSON.parse(localStorage.getItem('dong_budgets') || '{}');
let addType = 'expense';
let selCatId = 'food';
let sumTab = 'expense';

// หมวดหมู่
const EXP_CATS = [
  {id:'food', icon:'🍜', name:'อาหาร'}, {id:'drink', icon:'🧋', name:'กาแฟ'},
  {id:'travel', icon:'🚌', name:'เดินทาง'}, {id:'shop', icon:'🛍️', name:'ช้อปปิ้ง'},
  {id:'other', icon:'📦', name:'อื่นๆ'}
];
const INC_CATS = [
  {id:'salary', icon:'💼', name:'เงินเดือน'}, {id:'special', icon:'⭐', name:'งานพิเศษ'},
  {id:'other_i', icon:'💰', name:'อื่นๆ'}
];

// ══════ LIFF & AUTH ══════
async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      userId = profile.userId;
      document.getElementById('lineLogin').classList.add('hidden');
      syncData();
    } else {
      document.getElementById('lineLogin').classList.remove('hidden');
    }
  } catch (e) {
    userId = 'local_user'; // กรณีเปิดบน Browser ทั่วไป
    syncData();
  }
  setTimeout(() => document.getElementById('splash').classList.add('hide'), 1500);
}

// ══════ CORE FUNCTIONS ══════
function goPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const key = id.replace('panel-', '');
  document.getElementById('nav-' + key)?.classList.add('active');
  if(id === 'panel-history') renderHistory();
}

function setAddType(type) {
  addType = type;
  document.getElementById('tabExp').classList.toggle('active', type === 'expense');
  document.getElementById('tabInc').classList.toggle('active', type === 'income');
  document.getElementById('btnAdd').style.background = type === 'expense' ? 'var(--pink)' : 'var(--teal)';
  selCatId = type === 'expense' ? 'food' : 'salary';
  renderCatGrid();
}

function renderCatGrid() {
  const cats = addType === 'expense' ? EXP_CATS : INC_CATS;
  const container = document.getElementById('catGrid2');
  container.innerHTML = cats.map(c => `
    <div onclick="selCatId='${c.id}'; renderCatGrid();" 
         style="padding:10px; border:2px solid ${selCatId===c.id ? (addType==='expense'?'#FF4785':'#00C9A7') : '#E5E5EA'}; 
         border-radius:12px; text-align:center; background:#fff;">
      <div style="font-size:1.2rem;">${c.icon}</div>
      <div style="font-size:.6rem; font-weight:700;">${c.name}</div>
    </div>
  `).join('');
}

async function addEntry() {
  const amt = parseFloat(document.getElementById('inputAmt').value);
  if (!amt) return showToast('ใส่จำนวนเงินด้วยนะ 🐼');
  
  const cat = [...EXP_CATS, ...INC_CATS].find(c => c.id === selCatId);
  const newEntry = {
    id: Date.now(),
    type: addType,
    amount: amt,
    catId: selCatId,
    catIcon: cat.icon,
    catName: cat.name,
    note: document.getElementById('noteField').value || cat.name,
    date: new Date().toISOString().slice(0, 10)
  };

  entries.push(newEntry);
  save();
  document.getElementById('inputAmt').value = '';
  document.getElementById('noteField').value = '';
  showToast('บันทึกเรียบร้อยแล้ว ✨');
  goPanel('panel-home');
  renderAll();
}

function parseChat() {
  const text = document.getElementById('chatIn').value;
  const amt = parseFloat((text.match(/\d+/) || [])[0]);
  if (!amt) return showToast('หาตัวเลขไม่เจอจ้า 🐼');
  
  // Logic เดาหมวดหมู่แบบง่าย
  let type = 'expense';
  if (text.includes('เงินเดือน') || text.includes('รับ')) type = 'income';
  
  document.getElementById('inputAmt').value = amt;
  document.getElementById('noteField').value = text;
  setAddType(type);
  addEntry();
  document.getElementById('chatIn').value = '';
}

function renderAll() {
  const ym = new Date().toISOString().slice(0, 7);
  const currentEntries = entries.filter(e => e.date.startsWith(ym));
  const inc = currentEntries.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
  const exp = currentEntries.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
  
  document.getElementById('balAmount').textContent = '฿' + (inc - exp).toLocaleString();
  document.getElementById('ieExpAmt').textContent = '฿' + exp.toLocaleString();
  document.getElementById('ieIncAmt').textContent = '฿' + inc.toLocaleString();
  
  // Render Category Rows (แบบย่อ)
  renderCatRows(currentEntries.filter(e => e.type === sumTab));
}

function renderCatRows(data) {
  const catMap = {};
  data.forEach(e => catMap[e.catId] = (catMap[e.catId] || 0) + e.amount);
  
  const cats = sumTab === 'expense' ? EXP_CATS : INC_CATS;
  document.getElementById('catRows').innerHTML = cats.map(c => {
    const amt = catMap[c.id] || 0;
    return `
      <div style="margin-bottom:12px;">
        <div style="display:flex; justify-content:space-between; font-size:.85rem; font-weight:600;">
          <span>${c.name}</span><span>฿${amt.toLocaleString()}</span>
        </div>
        <div class="bar-track" style="background:var(--bg);">
          <div class="bar-fill" style="width:${Math.min(amt/100, 100)}%; background:${sumTab==='expense'?'var(--pink)':'var(--teal)'};"></div>
        </div>
      </div>
    `;
  }).join('');
}

function renderHistory() {
  const ym = document.getElementById('filterMonth').value || new Date().toISOString().slice(0, 7);
  const list = entries.filter(e => e.date.startsWith(ym)).reverse();
  document.getElementById('txList2').innerHTML = list.map(e => `
    <div style="background:#fff; padding:12px; border-radius:14px; display:flex; align-items:center; gap:12px; box-shadow:0 1px 4px rgba(0,0,0,0.05);">
      <div style="font-size:1.5rem;">${e.catIcon}</div>
      <div style="flex:1;">
        <div style="font-weight:700; font-size:.9rem;">${e.note}</div>
        <div style="font-size:.7rem; color:var(--sub);">${e.date}</div>
      </div>
      <div style="font-weight:800; color:${e.type==='expense'?'var(--pink)':'var(--teal)'};">
        ${e.type==='expense'?'-':'+'}฿${e.amount}
      </div>
    </div>
  `).join('');
}

function save() {
  localStorage.setItem('dong_entries', JSON.stringify(entries));
  if (userId) {
    db.collection('dongNote').doc(userId).set({ entries, updatedAt: new Date() });
  }
}

async function syncData() {
  if (userId) {
    const doc = await db.collection('dongNote').doc(userId).get();
    if (doc.exists) {
      entries = doc.data().entries || [];
      localStorage.setItem('dong_entries', JSON.stringify(entries));
    }
  }
  renderAll();
  renderCatGrid();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function switchSumTab(tab) {
  sumTab = tab;
  document.getElementById('ieExp').classList.toggle('active', tab === 'expense');
  document.getElementById('ieInc').classList.toggle('active', tab === 'income');
  renderAll();
}

// Start App
initLiff();
</script>
</body>
</html>
