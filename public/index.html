<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Don Note">
<meta name="theme-color" content="#FF4785">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<title>돈노ท Don Note ⭐</title>

<style>
:root {
  --pink: #FF4785; --pink-light: #FFF0F5; --teal: #00C9A7; --teal-light: #E8FAF7;
  --bg: #F5F5F5; --white: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93; --border: #E5E5EA; --nav-h: 60px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;}
body{padding-bottom:var(--nav-h);}
.header{background:var(--white);padding:12px 18px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:center;position:relative;border-bottom:1px solid var(--border);}
.header-title{font-size:1rem;font-weight:700;}
.header-bear{position:absolute;left:16px;font-size:1.3rem;cursor:pointer;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--white);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom);z-index:100;}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--sub);font-size:.58rem;font-weight:600;}
.nav-btn.active{color:var(--pink);}
.nav-btn span{font-size:1.3rem;}
.panel{display:none;max-width:480px;margin:0 auto;padding:14px;}
.panel.active{display:block;}
.balance-wrap{text-align:center;margin-bottom:14px;padding:10px 0;}
.balance-amount{font-size:2.6rem;font-weight:900;}
.balance-amount.positive{color:#34C759;}
.balance-amount.negative{color:var(--pink);}
.ie-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.ie-card{padding:14px;border-radius:16px;border:2px solid var(--border);background:var(--white);cursor:pointer;}
.ie-card.active.exp-card{border-color:var(--pink);background:var(--pink-light);}
.ie-card.active.inc-card{border-color:var(--teal);background:var(--teal-light);}
.sum-card{background:var(--white);border-radius:20px;padding:18px 16px;box-shadow:0 1px 6px rgba(0,0,0,.07);}
.bar-track{height:5px;border-radius:4px;overflow:hidden;background:#eee;margin-top:5px;}
.bar-fill{height:100%;transition:width .9s ease;}
.cat-row{margin-bottom:14px;}
.cat-row-top{display:flex;justify-content:space-between;font-size:.92rem;font-weight:600;}
.cat-chip2{padding:10px 4px;border-radius:14px;border:2px solid var(--border);background:var(--white);text-align:center;display:flex;flex-direction:column;gap:3px;}
.cat-chip2.sel{border-color:var(--pink);background:var(--pink-light);}
#splash{position:fixed;inset:0;z-index:9999;background:#FF4785;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:0.5s;}
#splash.hide{opacity:0;pointer-events:none;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1C1C1E;color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;opacity:0;transition:0.3s;z-index:600;}
.toast.show{opacity:1;}
.hidden{display:none;}
</style>
</head>


<body>
<div id="lineLogin" class="hidden" style="position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;">
  <div style="font-size:5rem;margin-bottom:12px;">🐼</div>
  <div style="font-size:1.4rem;font-weight:900;color:var(--pink);margin-bottom:6px;">Don Note ⭐</div>
  <div style="font-size:.85rem;color:var(--sub);margin-bottom:32px;text-align:center;">กรุณาเข้าสู่ระบบเพื่อซิงค์ข้อมูลของคุณ</div>
  <button class="btn-line-login" onclick="liff.login()" style="background:#06C755;color:#fff;border:none;padding:16px 36px;border-radius:16px;font-size:1rem;font-weight:800;display:flex;align-items:center;gap:10px;cursor:pointer;">
    เข้าสู่ระบบด้วย LINE
  </button>
</div>

<div id="splash">
  <div style="font-size:72px;">🐼</div>
  <div style="color:#fff;font-size:1.5rem;font-weight:800;margin-top:10px;">Don Note</div>
</div>

<div class="header">
  <div class="header-bear" id="headerBear">🐼</div>
  <div class="header-title">Don Note ⭐</div>
</div>

<div class="panel active" id="panel-home">
  <div class="balance-wrap">
    <div style="font-size:.72rem;color:var(--sub);font-weight:600;text-transform:uppercase;">เหลือเก็บ</div>
    <div class="balance-amount" id="balAmount">฿0</div>
  </div>

  <div class="chat-box" style="background:var(--white);border-radius:16px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:14px;">
    <div style="display:flex;gap:8px;">
      <input class="note-field" id="chatIn" placeholder="พิมพ์สั้นๆ เช่น ข้าว 50" style="margin:0;flex:1;border:1px solid var(--border);border-radius:12px;padding:10px;">
      <button onclick="parseChat()" style="padding:0 18px;border:none;border-radius:12px;background:var(--pink);color:#fff;font-weight:700;cursor:pointer;">➤</button>
    </div>
  </div>

  <div class="ie-grid">
    <div class="ie-card exp-card active" id="ieExp" onclick="switchSumTab('expense')">
      <div style="font-size:.72rem;font-weight:700;color:var(--pink);margin-bottom:5px;">รายจ่าย</div>
      <div class="iec-amount" id="ieExpAmt" style="font-size:1.25rem;font-weight:900;color:var(--pink);">฿0</div>
    </div>
    <div class="ie-card inc-card" id="ieInc" onclick="switchSumTab('income')">
      <div style="font-size:.72rem;font-weight:700;color:var(--teal);margin-bottom:5px;">รายรับ</div>
      <div class="iec-amount" id="ieIncAmt" style="font-size:1.25rem;font-weight:900;color:var(--teal);">฿0</div>
    </div>
  </div>

  <div class="sum-card">
    <div id="catRows"></div>
  </div>
</div>

<div class="panel" id="panel-add">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
    <button id="tabExp" onclick="setAddType('expense')" style="padding:10px;border:none;border-radius:10px;font-weight:700;cursor:pointer;">รายจ่าย</button>
    <button id="tabInc" onclick="setAddType('income')" style="padding:10px;border:none;border-radius:10px;font-weight:700;cursor:pointer;">รายรับ</button>
  </div>
  <input type="number" id="inputAmt" placeholder="0" style="width:100%;font-size:2.5rem;font-weight:800;text-align:center;border:none;background:transparent;margin-bottom:20px;outline:none;">
  <div id="catGrid2" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;"></div>
  <input id="noteField" class="note-field" placeholder="รายละเอียด..." style="width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;margin-bottom:20px;">
  <button onclick="addEntry()" style="width:100%;padding:16px;border:none;border-radius:14px;background:var(--pink);color:#fff;font-size:1.1rem;font-weight:800;cursor:pointer;">บันทึก ✓</button>
</div>

<div class="panel" id="panel-history">
  <div style="margin-bottom:15px;">
    <input type="month" id="filterMonth" onchange="renderHistory()" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);">
  </div>
  <div id="txList2"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="goPanel('panel-home')"><span>🏠</span>สรุป</button>
  <button class="nav-btn" id="nav-add" onclick="goPanel('panel-add')"><span>✏️</span>บันทึก</button>
  <button class="nav-btn" id="nav-history" onclick="goPanel('panel-history')"><span>📋</span>รายการ</button>
  <button class="nav-btn" id="nav-settings" onclick="goPanel('panel-settings')"><span>⚙️</span>ตั้งค่า</button>
</nav>

<div class="panel" id="panel-settings">
  <div style="background:white;border-radius:20px;padding:20px;text-align:center;">
    <div id="lineNameDisplay" style="font-weight:700;font-size:1.2rem;margin-bottom:10px;">User Name</div>
    <div id="cloudStatusSub" style="font-size:0.8rem;color:var(--sub);margin-bottom:20px;">สถานะ: กำลังเช็กระบบ...</div>
    <button onclick="liff.logout();location.reload();" style="color:var(--pink);background:none;border:1px solid var(--pink);padding:8px 20px;border-radius:10px;cursor:pointer;">ออกจากระบบ</button>
  </div>
</div>

<div class="toast" id="toast"></div>


<script>
// 1. ตั้งค่า Firebase (อ้างอิงจากโปรเจกต์ Don Note ของคุณ)
const firebaseConfig = {
  apiKey: "AIzaSyAxEfomFx8g_Du_tdFjU1ji1-Hofno-sv8",
  authDomain: "don-note-f2bcd.firebaseapp.com",
  projectId: "don-note-f2bcd",
  storageBucket: "don-note-f2bcd.firebasestorage.app",
  messagingSenderId: "906046825048",
  appId: "1:906046825048:web:a415a5bb1f653fcb18202d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 2. ตั้งค่า LINE LIFF
const LIFF_ID = '2009250866-MmcKPhwq';
let userId = null, lineProfile = null;
let entries = JSON.parse(localStorage.getItem('dong_entries') || '[]');
let addType = 'expense', selCatId = 'food';

// หมวดหมู่สำหรับวาด UI (ต้องมีเพื่อให้ปุ่มขึ้น)
const EXP_CATS = [{id:'food',icon:'🍜',name:'อาหาร'},{id:'drink',icon:'🧋',name:'เครื่องดื่ม'},{id:'travel',icon:'🚌',name:'เดินทาง'},{id:'shop',icon:'🛍️',name:'ช้อปปิ้ง'},{id:'other',icon:'📦',name:'อื่นๆ'}];
const INC_CATS = [{id:'salary',icon:'💼',name:'เงินเดือน'},{id:'special',icon:'⭐',name:'รายได้เสริม'}];

// 3. เริ่มต้นระบบ LIFF
async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      lineProfile = await liff.getProfile(); // ดึงข้อมูล Profile มาเก็บไว้
      userId = lineProfile.userId;
      
      document.getElementById('lineLogin').classList.add('hidden');
      updateLineProfileUI(); // แสดงรูปและชื่อ
      initApp(); // เริ่มโหลดข้อมูล
      
      // เช็กถ้ากดมาจาก LINE Webhook (#history)
      if (window.location.hash === '#history') goPanel('panel-history');
    } else {
      document.getElementById('lineLogin').classList.remove('hidden');
      document.getElementById('splash').classList.add('hide');
    }
  } catch (e) { console.error("LIFF Error:", e); }
}

// 4. แสดงรูปและชื่อโปรไฟล์
function updateLineProfileUI() {
  if (!lineProfile) return;
  const hb = document.getElementById('headerBear');
  if (hb && lineProfile.pictureUrl) {
    hb.innerHTML = `<img src="${lineProfile.pictureUrl}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid #FF4785;">`;
  }
  const nameDisplay = document.getElementById('lineNameDisplay');
  if (nameDisplay) nameDisplay.textContent = lineProfile.displayName;
}

// 5. จัดการหน้าจอและข้อมูล
function initApp() {
  renderAll(); 
  renderCatGrid2(); 
  loadFromCloud();
  setTimeout(() => document.getElementById('splash').classList.add('hide'), 1000);
}

function goPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const key = id.replace('panel-', '');
  document.getElementById('nav-' + key)?.classList.add('active');
  if (id === 'panel-history') renderHistory();
}

function renderAll() {
  const inc = entries.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
  const exp = entries.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
  document.getElementById('balAmount').textContent = '฿' + (inc - exp).toLocaleString();
  document.getElementById('ieIncAmt').textContent = '฿' + inc.toLocaleString();
  document.getElementById('ieExpAmt').textContent = '฿' + exp.toLocaleString();
}

// 6. บันทึกและซิงค์ข้อมูล
function addEntry() {
  const amt = parseFloat(document.getElementById('inputAmt').value);
  if (!amt) return showToast('ใส่ยอดเงินด้วยนะ 🐼');
  const cat = [...EXP_CATS, ...INC_CATS].find(c => c.id === selCatId);
  entries.push({ id: Date.now(), type: addType, amount: amt, catId: selCatId, catName: cat.name, catIcon: cat.icon, date: new Date().toISOString().slice(0,10) });
  saveData();
  goPanel('panel-home');
  showToast('บันทึกแล้ว ✨');
}

function saveData() {
  localStorage.setItem('dong_entries', JSON.stringify(entries));
  if (userId) {
    db.collection('dongNote').doc(userId).set({ entries, updatedAt: new Date().toISOString() });
  }
  renderAll();
}

async function loadFromCloud() {
  if (!userId) return;
  const doc = await db.collection('dongNote').doc(userId).get();
  if (doc.exists) {
    entries = doc.data().entries || [];
    renderAll();
    if(document.getElementById('cloudStatusSub')) document.getElementById('cloudStatusSub').textContent = 'สถานะ: ✅ ซิงค์ข้อมูลแล้ว';
  }
}

// ฟังก์ชันเสริม
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
function setAddType(t) { addType = t; selCatId = (t === 'expense' ? 'food' : 'salary'); renderCatGrid2(); }
function renderCatGrid2() {
  const cats = (addType === 'expense' ? EXP_CATS : INC_CATS);
  document.getElementById('catGrid2').innerHTML = cats.map(c => `
    <div class="cat-chip2 ${selCatId === c.id ? 'sel' : ''}" onclick="selCatId='${c.id}';renderCatGrid2()">
      <span>${c.icon}</span><small>${c.name}</small>
    </div>`).join('');
}

// เริ่มการทำงาน
initLiff();
</script>
</body>
</html>
