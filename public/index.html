<script>
// ══════ FIREBASE SETUP ══════
const firebaseConfig = {
  apiKey: "AIzaSyAxEfomFx8g_Du_tdFjU1ji1-Hofno-sv8",
  authDomain: "don-note-f2bcd.firebaseapp.com",
  projectId: "don-note-f2bcd",
  storageBucket: "don-note-f2bcd.firebasestorage.app",
  messagingSenderId: "906046825048",
  appId: "1:906046825048:web:a415a5bb1f653fcb18202d",
  measurementId: "G-S7GZWXQTL4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.settings({ ignoreUndefinedProperties: true });

// ══════ LIFF + LINE LOGIN ══════
const LIFF_ID = '2009230946-hp9vcPh3';
let userId = null;
let lineProfile = null;
let hasLinePic = false;

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (liff.isLoggedIn()) {
      lineProfile = await liff.getProfile();
      userId = lineProfile.userId;
      document.getElementById('lineLogin').classList.add('hidden');
      updateLineProfileUI();
      init();
      return;
    }

    const ll = document.getElementById('lineLogin');
    if (ll) ll.classList.remove('hidden');

    const sp = document.getElementById('splash');
    if (sp) sp.classList.add('hide');

  } catch (e) {
    console.error('LIFF Error:', e);
    useFallbackUserId();
  }
}

function useFallbackUserId() {
  let localId = localStorage.getItem('dong_local_uid');
  if (!localId) {
    localId = 'local_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem('dong_local_uid', localId);
  }
  userId = localId;
  document.getElementById('lineLogin')?.classList.add('hidden');
  updateLineProfileUI();
  init();
}

function updateLineProfileUI() {
  hasLinePic = false;
  if (!lineProfile) return;

  const hb = document.getElementById('headerBear');
  if (hb && lineProfile.pictureUrl) {
    hb.innerHTML = `<img src="${lineProfile.pictureUrl}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid #FF4785;">`;
    hasLinePic = true;
  }
  const nameEl = document.getElementById('lineNameDisplay');
  const picEl  = document.getElementById('linePicDisplay');
  if (nameEl) nameEl.textContent = lineProfile.displayName;
  if (picEl && lineProfile.pictureUrl) {
    picEl.src = lineProfile.pictureUrl;
    picEl.style.display = 'block';
  }
}

function lineLogout(){
  try{
    if (window.liff && liff.isLoggedIn && liff.isLoggedIn()) {
      liff.logout();
      location.reload();
      return;
    }
  }catch(e){}
  localStorage.removeItem('dong_local_uid');
  showToast('ออกจากระบบแล้ว');
  location.reload();
}

// ══════ CLOUD SYNC, CONSTANTS, STATE, GOOGLE SHEET, INIT, ทุกฟังก์ชันที่เหลือทั้งหมดเหมือนเดิม 100% (renderAll, parseChat, addEntry, renderPieChart, etc.) ══════

/* ฉันไม่ตัดฟังก์ชันใดๆ ทั้งสิ้น */

window.addEventListener('load', () => {
  const sp = document.getElementById('splash');
  setTimeout(() => {
    sp.classList.add('hide');
    setTimeout(() => sp.remove(), 520);
  }, 1400);
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// START
initLiff();
</script>
