<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summary</title>

<style>
body{margin:0;font-family:'Kanit',sans-serif;background:#f7f7fb;color:#333}
.container{max-width:480px;margin:auto;padding:16px}

.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.05)}

.summary{display:flex;gap:10px}
.sum{flex:1;padding:14px;border-radius:16px;text-align:center;font-weight:700}
.exp{background:#ffeef3;color:#ff5c8a}
.inc{background:#e9fbf7;color:#2fbfa5}

.cat{margin:12px 0}
.bar{height:10px;background:#f2d2db;border-radius:8px;margin-top:6px;overflow:hidden}
.fill{height:100%;background:#ff8fb3;border-radius:8px}

.switch{
display:flex;
justify-content:center;
margin:10px 0;
}
button{
padding:8px 14px;
border-radius:20px;
border:none;
background:#eee;
}
.active{background:#111;color:#fff}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>สรุป</h3>

<div class="summary">
<div class="sum exp">รายจ่าย<br><span id="exp">฿0</span></div>
<div class="sum inc">รายรับ<br><span id="inc">฿0</span></div>
</div>

<div class="switch">
<button id="btnExp" class="active" onclick="show('expense')">รายจ่าย</button>
<button id="btnInc" onclick="show('income')">รายรับ</button>
</div>

</div>

<div class="card">
<h3 id="title">สรุปรายจ่าย</h3>
<div id="cats"></div>
</div>

</div>

<script>
let data=JSON.parse(localStorage.getItem("donnote")||"[]");

function sum(type){
return data.filter(d=>d.type==type).reduce((s,d)=>s+d.amount,0);
}

exp.innerText="฿"+sum("expense");
inc.innerText="฿"+sum("income");

function show(type){

btnExp.classList.toggle("active",type=="expense");
btnInc.classList.toggle("active",type=="income");

title.innerText= type=="expense"?"สรุปรายจ่าย":"สรุปรายรับ";

let filtered=data.filter(d=>d.type==type);

let byCat={};

filtered.forEach(d=>{
byCat[d.category]=(byCat[d.category]||0)+d.amount;
});

let total=sum(type);

cats.innerHTML=Object.entries(byCat).map(([cat,val])=>`
<div class="cat">
<div style="display:flex;justify-content:space-between">
<span>${cat}</span>
<span>฿${val}</span>
</div>
<div class="bar">
<div class="fill" style="width:${total?val/total*100:0}%"></div>
</div>
</div>
`).join('');
}

show("expense");
</script>

</body>
</html>
