<button class="btn" style="margin-bottom: 15px; background: #262626; color: var(--accent); border: 1px solid var(--accent);" onclick="openReport()">
    📜 ดูรายงานสรุปเดือนนี้ (ROAR REPORT)
</button>

<div id="reportModal" class="modal hidden">
    <div class="card" style="width:90%; max-width:400px; max-height:85vh; overflow-y:auto; background:#121212; border: 1px solid var(--accent); padding:0;">
        <span class="close-x" onclick="closeReport()">&times;</span>
        
        <div style="background: linear-gradient(to bottom, #d4af37, #aa771c); color:#000; padding:30px 20px; text-align:center;">
            <h3 style="margin:0;">FEBRUARY REPORT</h3>
            <p style="margin:5px 0 0; font-size:0.8rem; opacity:0.8;">สรุปสถานะการเงินฉบับ Roar Money</p>
        </div>

        <div style="padding:20px;">
            <div id="reportGreeting" style="font-size:0.95rem; line-height:1.6; margin-bottom:20px; text-align:center;"></div>

            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">

            <h4 style="color:var(--accent); margin-bottom:10px;">🚩 รายจ่ายที่สูงที่สุด</h4>
            <div id="topExpenses" style="font-size:0.85rem;"></div>

            <h4 style="color:var(--accent); margin-top:25px; margin-bottom:10px;">💰 พลังการออมของคุณ</h4>
            <div style="background:#262626; height:12px; border-radius:10px; overflow:hidden; margin-bottom:5px;">
                <div id="saveBar" style="background:var(--accent); height:100%; width:0%; transition:1s;"></div>
            </div>
            <p id="saveText" style="font-size:0.75rem; text-align:right; color:#aaa;"></p>

            <div id="proInsight" style="margin-top:30px; background:#262626; border:1px dashed var(--accent); padding:15px; border-radius:15px; text-align:center;">
                <p style="font-size:0.8rem; margin:0 0 10px 0;">🔒 วิเคราะห์เชิงลึกว่าเงินคุณรั่วจากจุดไหน</p>
                <button class="btn" style="padding:8px; font-size:0.75rem;" onclick="openPremium()">ปลดล็อก ROAR PRO</button>
            </div>
        </div>
    </div>
</div>

<script>
function openReport() {
    const month = new Date().toISOString().slice(0, 7);
    const mData = tigerData.filter(e => e.date.startsWith(month));
    const inc = mData.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
    const exp = mData.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
    const savings = inc - exp;
    const savePercent = inc > 0 ? Math.max(0, (savings / inc) * 100) : 0;

    // 1. สร้างข้อความทักทาย
    let greeting = "";
    if (savePercent > 30) greeting = "🦁 สุดยอดมากครับ! พลังการคำรามของคุณแข็งแกร่งมาก คุณออมเงินได้เกินเป้าหมายที่ควรจะเป็นครับ";
    else if (savePercent > 0) greeting = "🐯 ทำได้ดีครับ! คุณยังมีเงินเหลือเก็บพอน่าชื่นใจ พยายามคุมรายจ่ายอีกนิดจะเยี่ยมมากครับ";
    else greeting = "🦁 เดือนนี้ดูท่าจะคำรามไม่ออกครับ รายจ่ายแซงรายรับไปแล้ว ลองเช็กรายการข้างล่างดูว่าส่วนไหนลดได้บ้างนะ";
    document.getElementById('reportGreeting').innerText = greeting;

    // 2. หา Top 3 รายจ่าย
    const expCats = {};
    mData.filter(e => e.type === 'expense').forEach(e => {
        expCats[e.category] = (expCats[e.category] || 0) + e.amount;
    });
    const sortedExp = Object.entries(expCats).sort((a,b) => b[1] - a[1]).slice(0, 3);
    document.getElementById('topExpenses').innerHTML = sortedExp.length > 0 
        ? sortedExp.map(([cat, amt], i) => `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>${i+1}. ${cat}</span> <strong>฿${amt.toLocaleString()}</strong></div>`).join('')
        : "ยังไม่มีข้อมูลรายจ่ายครับ";

    // 3. อัปเดตแถบการออม
    document.getElementById('saveBar').style.width = savePercent + "%";
    document.getElementById('saveText').innerText = `คุณออมเงินได้ ${savePercent.toFixed(1)}% ของรายได้`;

    // 4. เช็กสถานะ Pro เพื่อซ่อน Insight
    if(isPro) {
        document.getElementById('proInsight').innerHTML = `<p style="font-size:0.8rem; color:var(--accent);">✅ สมาชิก Pro: สรุปแนวโน้มการใช้เงินของคุณลดลง 5% จากเดือนที่แล้วครับ</p>`;
    }

    document.getElementById('reportModal').classList.remove('hidden');
}

function closeReport() { document.getElementById('reportModal').classList.add('hidden'); }
</script>
