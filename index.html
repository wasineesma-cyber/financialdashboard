<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Note</title>

<style>
body{margin:0;font-family:'Kanit',sans-serif;background:#f7f7fb;color:#333}
.container{max-width:480px;margin:auto;padding:16px;padding-bottom:90px}

.page{display:none}
.page.active{display:block}

.card{background:#fff;border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.05)}

.summary{display:flex;gap:10px}
.sum{flex:1;padding:14px;border-radius:16px;text-align:center;font-weight:700}
.exp{background:#ffeef3;color:#ff5c8a}
.inc{background:#e9fbf7;color:#2fbfa5}

/* Bottom Nav */
.nav{
position:fixed;bottom:0;left:0;right:0;
background:#fff;
display:flex;
justify-content:space-around;
padding:8px 0;
box-shadow:0 -2px 10px rgba(0,0,0,.05)
}
.nav div{font-size:12px;text-align:center;color:#888}
.nav .active{color:#ff5c8a}

/* Mascot */
.mascot{
position:fixed;
bottom:70px;
right:16px;
font-size:48px;
animation:bounce 2s infinite;
}
@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}
</style>
</head>

<body>

<div class="mascot">🐻🏺</div>

<div class="container">

<!-- 🏠 SUMMARY -->
<div id="home" class="page active">
<div class="card">
<h3>สรุป</h3>
<div class="summary">
<div class="sum exp">รายจ่าย<br><span id="exp">฿0</span></div>
<div class="sum inc">รายรับ<br><span id="inc">฿0</span></div>
</div>
</div>
</div>

<!-- 📊 ANALYTICS -->
<div id="analytics" class="page">
<div class="card">
<h3>วิเคราะห์</h3>
<p>กราฟและสถิติจะอยู่ตรงนี้</p>
</div>
</div>

<!-- ⏰ GOAL -->
<div id="goal" class="page">
<div class="card">
<h3>เป้าการออม</h3>
<input id="goalInput" type="number" placeholder="ตั้งเป้า">
<button onclick="setGoal()">ตั้งเป้า</button>
<div id="goalText"></div>
</div>
</div>

<!-- 📋 LIST -->
<div id="listPage" class="page">
<div class="card">
<h3>รายการ</h3>
<div id="list"></div>
</div>
</div>

<!-- ⚙️ SETTINGS -->
<div id="settings" class="page">
<div class="card">
<h3>ตั้งค่า</h3>
<p>ธีม / โปรไฟล์ / อื่น ๆ</p>
</div>
</div>

</div>

<!-- 🌸 Bottom Nav -->
<div class="nav">
<div class="active" onclick="show('home',this)">🏠<br>สรุป</div>
<div onclick="show('analytics',this)">📊<br>วิเคราะห์</div>
<div onclick="show('goal',this)">⏰<br>เป้า</div>
<div onclick="show('listPage',this)">📋<br>รายการ</div>
<div onclick="show('settings',this)">⚙️<br>ตั้งค่า</div>
</div>

<script>
let data=JSON.parse(localStorage.getItem("donnote")||"[]");

function show(page,el){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');

document.querySelectorAll('.nav div').forEach(n=>n.classList.remove('active'));
el.classList.add('active');
}

function update(){
let inc=0,exp=0;
data.forEach(d=>d.type=="income"?inc+=d.amount:exp+=d.amount);
expEl.innerText="฿"+exp;
incEl.innerText="฿"+inc;
}

const expEl=document.getElementById("exp");
const incEl=document.getElementById("inc");

update();
</script>

</body>
</html>
