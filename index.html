<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta charset="UTF-8" />
<title>ดงดง Universe</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f6f7fb;
}

/* HEADER */
.header{
  background:white;
  padding:16px;
  font-weight:700;
  font-size:20px;
  display:flex;
  gap:10px;
  align-items:center;
}

/* CHAT */
.chatbox{
  background:white;
  margin:12px;
  padding:14px;
  border-radius:16px;
}
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* LIST */
.card{
  background:white;
  margin:12px;
  padding:14px;
  border-radius:16px;
}

/* DONGDONG */
#dong{
  position:fixed;
  bottom:90px;
  left:-80px;
  font-size:56px;
  animation:run 12s linear infinite;
  cursor:pointer;
}
@keyframes run{
  from{left:-80px}
  to{left:110%}
}
</style>
</head>

<body>

<div class="header">🐻 ดงดง Universe</div>

<!-- CHAT -->
<div class="chatbox">
  💬 พิมพ์รายการ เช่น "ชาไข่มุก 65"
  <input id="chat" placeholder="พิมพ์แล้วกด Enter"/>
</div>

<!-- SUMMARY -->
<div class="card">
  รายรับ: <span id="inc">0</span> บาท<br>
  รายจ่าย: <span id="exp">0</span> บาท
</div>

<!-- LIST -->
<div class="card">
  <b>รายการ</b>
  <div id="list"></div>
</div>

<!-- DONGDONG -->
<div id="dong">🐻</div>

<script>
const data=[]
const chat=document.getElementById("chat")

/* ===== AUTO CATEGORY ===== */
function detectCategory(text){
  text=text.toLowerCase()

  if(text.includes("ชา")||text.includes("กาแฟ")||text.includes("ข้าว"))
    return ["อาหาร","expense"]

  if(text.includes("grab")||text.includes("taxi")||text.includes("รถ"))
    return ["เดินทาง","expense"]

  if(text.includes("เงินเดือน")||text.includes("ขาย"))
    return ["รายรับ","income"]

  return ["อื่นๆ","expense"]
}

/* ===== CHAT INPUT ===== */
chat.addEventListener("keypress",e=>{
  if(e.key==="Enter"){
    const msg=chat.value
    const amount=Number(msg.match(/\d+/))
    if(!amount) return

    const [cat,type]=detectCategory(msg)

    data.push({msg,amount,type,cat})
    chat.value=""

    render()
  }
})

function render(){
  let inc=0,exp=0
  list.innerHTML=""

  data.forEach(d=>{
    const div=document.createElement("div")
    div.textContent=`${d.cat} — ${d.msg} (${d.amount})`
    list.appendChild(div)

    if(d.type==="income") inc+=d.amount
    else exp+=d.amount
  })

  incEl.textContent=inc
  expEl.textContent=exp
}

const incEl=document.getElementById("inc")
const expEl=document.getElementById("exp")
const list=document.getElementById("list")

/* ===== DONGDONG TIME OUTFIT ===== */
const dong=document.getElementById("dong")
const hour=new Date().getHours()

if(hour<12) dong.textContent="🐻‍❄️"
else if(hour<18) dong.textContent="🐻"
else dong.textContent="🐻‍🌙"

/* ===== DONGDONG TALK ===== */
dong.onclick=()=>{
  alert("ดงดง: วันนี้เก็บเงินเก่งมั้ย 🐻💰")
}
</script>

</body>
</html>
