<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บัญชีแชตอัจฉริยะ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#ffffff;
  --card:#f3f4f6;
  --text:#111827;
  --sub:#6b7280;
  --border:#e5e7eb;
  --accent:#6366f1;
}
body.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#e5e7eb;
  --sub:#9ca3af;
  --border:#2a2a2a;
  --accent:#818cf8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.container{max-width:900px;margin:auto;padding:20px}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}
.btn{
  padding:8px 12px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  width:100%;
}
.summary{
  display:grid;
  gap:12px;
  margin-bottom:20px;
}
.amount{font-size:1.3rem;font-weight:600}
.income{color:#22c55e}
.expense{color:#ef4444}
.balance{color:#3b82f6}
.tx-item{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid var(--border);
}
.chat-box{
  height:280px;
  overflow-y:auto;
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
  background:var(--bg);
}
.msg{margin-bottom:8px}
.user{text-align:right}
.system{color:var(--sub)}
</style>
</head>

<body class="dark">

<header>
  <h2>บัญชีแชต</h2>
  <button class="btn" onclick="toggleTheme()">สลับธีม</button>
</header>

<div class="container">

<div class="card">
  <select id="accountSelect" onchange="switchAccount()"></select>
  <button class="btn" onclick="addAccount()">+ เพิ่มบัญชี</button>
</div>

<div class="summary card">
  <div>รายรับเดือนนี้ <div id="totalIncome" class="amount income">฿0</div></div>
  <div>รายจ่ายเดือนนี้ <div id="totalExpense" class="amount expense">฿0</div></div>
  <div>คงเหลือ <div id="totalBalance" class="amount balance">฿0</div></div>
</div>

<div class="card">
  <h3>แชตบันทึกรายการ</h3>
  <div id="chatBox" class="chat-box"></div>
  <div style="display:flex;gap:8px;">
    <input type="text" id="chatInput" placeholder="พิมพ์ เช่น ซื้อข้าว 80">
    <button class="btn" onclick="sendChat()">ส่ง</button>
  </div>
</div>

<div class="card">
  <h3>ประวัติ</h3>
  <div id="txList"></div>
</div>

<div class="card">
  <h3>กราฟรายรับ/รายจ่าย</h3>
  <canvas id="barChart"></canvas>
</div>

</div>

<script>
let accounts=JSON.parse(localStorage.getItem('accounts')||'{"บัญชีหลัก":[]}');
let currentAccount=localStorage.getItem('currentAccount')||'บัญชีหลัก';
let barChart;

function save(){
  localStorage.setItem('accounts',JSON.stringify(accounts));
  localStorage.setItem('currentAccount',currentAccount);
}

function toggleTheme(){
  document.body.classList.toggle('dark');
}

function renderAccounts(){
  accountSelect.innerHTML=Object.keys(accounts)
  .map(a=>`<option ${a===currentAccount?'selected':''}>${a}</option>`).join('');
}

function switchAccount(){
  currentAccount=accountSelect.value;
  save();
  render();
}

function addAccount(){
  const name=prompt("ชื่อบัญชีใหม่");
  if(!name)return;
  accounts[name]=[];
  currentAccount=name;
  save();
  renderAccounts();
  render();
}

function addMessage(text,type){
  const box=document.getElementById('chatBox');
  const div=document.createElement('div');
  div.className='msg '+type;
  div.innerHTML=type==='user'?`<b>คุณ:</b> ${text}`:`<b>ระบบ:</b> ${text}`;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function detectCategory(text){
  const map={
    'อาหาร':['ข้าว','กาแฟ','ชานม','ของกิน'],
    'เดินทาง':['น้ำมัน','รถ','grab','แท็กซี่'],
    'สาธารณูปโภค':['ค่าไฟ','ค่าน้ำ','ค่าเน็ต'],
    'ช้อปปิ้ง':['เสื้อ','รองเท้า','กระเป๋า'],
    'สุขภาพ':['หมอ','ยา'],
    'เงินเดือน':['เงินเดือน'],
  };
  for(const cat in map){
    if(map[cat].some(w=>text.includes(w))) return cat;
  }
  return 'อื่นๆ';
}

function sendChat(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  addMessage(text,'user');

  const expenseWords=['จ่าย','ซื้อ','ค่า','เติม'];
  const incomeWords=['รับ','ได้','เงินเข้า'];

  let type=null;
  if(expenseWords.some(w=>text.includes(w))) type='expense';
  if(incomeWords.some(w=>text.includes(w))) type='income';

  const amountMatch=text.match(/\d+(\.\d+)?/);
  const amount=amountMatch?parseFloat(amountMatch[0]):null;

  if(!type||!amount){
    addMessage('พิมพ์เช่น: ซื้อข้าว 80','system');
    input.value='';
    return;
  }

  const category=detectCategory(text);

  const entry={
    id:Date.now(),
    type,amount,category,
    date:new Date().toISOString().slice(0,10),
    desc:text
  };

  accounts[currentAccount].push(entry);
  save();
  render();

  addMessage(`บันทึก ${type==='income'?'รายรับ':'รายจ่าย'} ${amount.toLocaleString()} บาท หมวด ${category} เรียบร้อยแล้ว`,'system');
  input.value='';
}

function render(){
  const data=accounts[currentAccount]||[];
  const ym=new Date().toISOString().slice(0,7);
  const month=data.filter(e=>e.date.startsWith(ym));
  const income=month.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const expense=month.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);

  totalIncome.textContent='฿'+income.toLocaleString();
  totalExpense.textContent='฿'+expense.toLocaleString();
  totalBalance.textContent='฿'+(income-expense).toLocaleString();

  txList.innerHTML=month.map(e=>`
    <div class="tx-item">
      <div>${e.desc}<br><small>${e.category} • ${e.date}</small></div>
      <div class="${e.type==='income'?'income':'expense'}">
      ${e.type==='income'?'+':'-'}฿${e.amount.toLocaleString()}</div>
    </div>
  `).join('');

  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{
      labels:['รายรับ','รายจ่าย'],
      datasets:[{
        data:[income,expense],
        backgroundColor:['#22c55e','#ef4444']
      }]
    }
  });
}

renderAccounts();
render();
</script>

</body>
</html>
