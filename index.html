<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff5c8a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>돈노트 Don Note ⭐</title>

<style>
body{
  margin:0;
  font-family:-apple-system, sans-serif;
  background:#fafafa;
  text-align:center;
}

/* HEADER */
.header{
  background:#fff;
  padding:14px;
  font-weight:800;
  font-size:18px;
  border-bottom:1px solid #eee;
}

/* DONG RUN */
#dong{
  position:fixed;
  bottom:20px;
  left:-80px;
  font-size:48px;
  animation:run 12s linear infinite;
}
@keyframes run{
  from{left:-80px}
  to{left:110%}
}

/* CARD */
.card{
  background:#fff;
  margin:18px;
  padding:18px;
  border-radius:20px;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
}

/* CHAT BOX */
input{
  width:70%;
  padding:12px;
  border-radius:14px;
  border:1px solid #eee;
  font-size:16px;
}

button{
  padding:12px 18px;
  border:none;
  background:#ff5c8a;
  color:#fff;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}

.balance{
  font-size:38px;
  font-weight:900;
  margin:10px 0;
}

.small{
  color:#888;
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">🐻 돈노트 Don Note</div>

<div class="card">
  <div class="small">เหลือเก็บ</div>
  <div class="balance" id="bal">฿0</div>
</div>

<div class="card">
  <div style="margin-bottom:8px;font-weight:700">
    ⚡ พิมพ์ เช่น "ชาไข่มุก 65"
  </div>

  <input id="chat" placeholder="กินข้าว 80">
  <button onclick="add()">บันทึก</button>
</div>

<div id="dong">🐻</div>

<script>
let money = JSON.parse(localStorage.getItem("money")||"0");

function update(){
  document.getElementById("bal").textContent =
    "฿" + money.toLocaleString("th-TH");
}
update();

function add(){
  const t = document.getElementById("chat").value;
  const amt = parseFloat((t.match(/\\d+/)||[])[0]);

  if(!amt){ alert("ใส่จำนวนเงินก่อน 🐻"); return; }

  if(/รับ|เงินเดือน|ขาย/.test(t)){
    money += amt;
    speak("ได้เงินแล้ว ดีใจจัง");
  }else{
    money -= amt;
    speak("ใช้เงินอีกแล้วนะ");
  }

  localStorage.setItem("money", money);
  document.getElementById("chat").value="";
  update();
}

/* 🐻 ดงดงพูดได้ */
function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "th-TH";
  speechSynthesis.speak(u);
}

/* เปลี่ยนหมีตามเวลา */
const h = new Date().getHours();
if(h<6) dong.textContent="🐻‍❄️";
else if(h<12) dong.textContent="🐻‍❄️";
else dong.textContent="🐻";
</script>

</body>
</html>
