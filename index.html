<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ดงดง Universe</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f6f7fb;
}

/* ===== HEADER ===== */
.header{
  background:white;
  padding:16px;
  font-weight:700;
  font-size:20px;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}
.bear{font-size:28px}

/* ===== SUMMARY ===== */
.card{
  background:white;
  margin:14px;
  padding:16px;
  border-radius:18px;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
}

.flex{display:flex;gap:10px}
.box{
  flex:1;
  padding:12px;
  border-radius:14px;
  font-weight:700;
}
.expense{background:#ffe7ef;color:#ff4f87}
.income{background:#e7fbf5;color:#00a889}

/* ===== LIST ===== */
.item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

/* ===== FLOAT BUTTON ===== */
.fab{
  position:fixed;
  bottom:80px;
  right:20px;
  background:#ff4f87;
  color:white;
  width:56px;
  height:56px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  box-shadow:0 8px 20px rgba(0,0,0,.2);
}

/* ===== NAV ===== */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:8px 0;
  box-shadow:0 -2px 10px rgba(0,0,0,.05);
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  display:none;
  align-items:center;
  justify-content:center;
}
.modalbox{
  background:white;
  padding:20px;
  border-radius:18px;
  width:90%;
  max-width:380px;
}
input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}
button{
  margin-top:14px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff4f87;
  color:white;
  font-weight:700;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="bear">🐻</div>
  ดงดง Universe
</div>

<!-- SUMMARY -->
<div class="card">
  <div class="flex">
    <div class="box expense">
      รายจ่าย<br>
      <span id="expenseTotal">฿0</span>
    </div>
    <div class="box income">
      รายรับ<br>
      <span id="incomeTotal">฿0</span>
    </div>
  </div>
</div>

<!-- LIST -->
<div class="card">
  <b>รายการล่าสุด</b>
  <div id="list"></div>
</div>

<!-- CHART -->
<div class="card">
  <canvas id="chart"></canvas>
</div>

<!-- FLOAT BUTTON -->
<div class="fab" onclick="openModal()">＋</div>

<!-- NAV -->
<div class="nav">
  <div>🏠</div>
  <div>📊</div>
  <div>🐻</div>
  <div>📋</div>
  <div>⚙️</div>
</div>

<!-- MODAL ADD -->
<div class="modal" id="modal">
  <div class="modalbox">
    <b>เพิ่มรายการ</b>

    <select id="type">
      <option value="expense">รายจ่าย</option>
      <option value="income">รายรับ</option>
    </select>

    <input id="name" placeholder="รายการ เช่น ชาไข่มุก"/>
    <input id="amount" type="number" placeholder="จำนวนเงิน"/>

    <button onclick="add()">บันทึก</button>
  </div>
</div>

<script>
let data=[]

function openModal(){
  modal.style.display="flex"
}
modal.onclick=e=>{
  if(e.target.id==="modal") modal.style.display="none"
}

function add(){
  let type=typeSelect.value
}
</script>

<script>
const modal=document.getElementById("modal")
const list=document.getElementById("list")
const incomeTotal=document.getElementById("incomeTotal")
const expenseTotal=document.getElementById("expenseTotal")
const typeSelect=document.getElementById("type")

function add(){
  const name=document.getElementById("name").value
  const amount=Number(document.getElementById("amount").value)
  const type=typeSelect.value

  if(!name||!amount) return

  data.push({name,amount,type})
  modal.style.display="none"

  render()
}

function render(){
  list.innerHTML=""
  let inc=0,exp=0

  data.slice().reverse().forEach(d=>{
    const div=document.createElement("div")
    div.className="item"
    div.innerHTML=`${d.name} <b>฿${d.amount}</b>`
    list.appendChild(div)

    if(d.type==="income") inc+=d.amount
    else exp+=d.amount
  })

  incomeTotal.textContent="฿"+inc
  expenseTotal.textContent="฿"+exp

  chart.data.datasets[0].data=[exp,inc]
  chart.update()
}

const chart=new Chart(document.getElementById("chart"),{
  type:"doughnut",
  data:{
    labels:["รายจ่าย","รายรับ"],
    datasets:[{
      data:[0,0],
      backgroundColor:["#ff4f87","#00a889"]
    }]
  }
})
</script>

</body>
</html>
