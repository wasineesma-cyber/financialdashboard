<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>น้องเสือช่วยจด v6.9 - Light & Fast</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #fffcf9; --card: rgba(255, 255, 255, 0.98); --text: #2d3436;
    --accent: #f39c12; --income: #27ae60; --expense: #e74c3c; --border: #f1f2f6;
}
[data-theme="dark"] {
    --bg: #1e272e; --card: rgba(47, 54, 64, 0.95); --text: #f5f6fa; --border: #353b48;
}
body { font-family: 'Inter', 'Kanit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; transition: 0.3s; }
.container { max-width: 500px; margin: auto; padding: 15px; }
.card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); box-shadow: 0 8px 20px rgba(0,0,0,0.06); position: relative; }
.tab-group { display: flex; gap: 8px; margin-bottom: 15px; }
.tab { flex: 1; padding: 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); cursor: pointer; text-align: center; font-weight: bold; font-size: 0.85rem; }
.tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 14px; cursor: pointer; font-weight: bold; transition: 0.2s; }
input, select, textarea { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 12px; box-sizing: border-box; outline: none; }
.chat-box { height: 200px; overflow-y: auto; padding: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
.msg { padding: 10px 16px; border-radius: 18px; font-size: 0.9rem; max-width: 85%; }
.user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
.system { background: var(--border); align-self: flex-start; border-bottom-left-radius: 2px; }
.tx-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.hidden { display: none !important; }
.modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:2000; backdrop-filter: blur(4px); }
.close-x { position: absolute; top: 15px; right: 15px; font-size: 1.5rem; cursor: pointer; color: var(--text); opacity: 0.5; }
</style>
</head>
<body data-theme="light">

<div class="container">
    <div style="text-align: center; padding: 10px;">
        <h2 style="margin:0;">🐯 น้องเสือช่วยจด</h2>
        <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 0.8rem; color:var(--text); opacity:0.6;">🌓 สลับโหมด</button>
    </div>

    <div class="card" style="background: linear-gradient(135deg, #f39c12, #e67e22); color: white; border: none;">
        <div style="display:flex; justify-content: space-between;"><small>คงเหลือเดือนนี้</small><small id="todayStatus">วันนี้: ฿0</small></div>
        <div id="totalBal" style="font-size: 2.4rem; font-weight: bold; margin: 10px 0;">฿0</div>
        <div style="display:flex; justify-content: space-between; font-size: 0.9rem; opacity: 0.9;"><span id="txtInc">รับ: ฿0</span><span id="txtExp">จ่าย: ฿0</span></div>
    </div>

    <div class="card">
        <div class="tab-group">
            <div class="tab active" onclick="switchTab('chat')" id="tChat">💬 แชต</div>
            <div class="tab" onclick="switchTab('manual')" id="tManual">📝 กรอกเอง</div>
            <div class="tab" onclick="openSettings()">⚙️ ตั้งค่าคำเดา</div>
        </div>

        <div id="panelChat">
            <div id="chatBox" class="chat-box"></div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="chatInput" placeholder="พิมพ์ เช่น ซื้อราดหน้า 60" onkeypress="if(event.key==='Enter') processChat()">
                <button class="btn" style="width:80px" onclick="processChat()">ส่ง</button>
            </div>
        </div>

        <div id="panelManual" class="hidden">
            <div style="display:flex; gap:8px; margin-bottom:12px;">
                <button class="tab active" id="mBtnExp" style="background:var(--expense); color:white;" onclick="setManualType('expense')">รายจ่าย</button>
                <button class="tab" id="mBtnInc" onclick="setManualType('income')">รายรับ</button>
            </div>
            <input type="text" id="mDesc" placeholder="รายการ">
            <input type="number" id="mAmount" placeholder="จำนวนเงิน">
            <select id="mCat">
                <option value="อาหาร">🍱 อาหาร/เครื่องดื่ม</option>
                <option value="เดลิเวอรี">🛵 เดลิเวอรี</option>
                <option value="เดินทาง">⛽ เดินทาง/น้ำมัน</option>
                <option value="ช้อปปิ้ง">🛍️ ช้อปปิ้ง</option>
                <option value="รายได้">💰 รายได้</option>
                <option value="อื่นๆ">✨ อื่นๆ</option>
            </select>
            <textarea id="mNote" rows="2" placeholder="รายละเอียดเพิ่มเติม"></textarea>
            <button class="btn" style="width:100%" onclick="processManual()">บันทึกข้อมูลครับ</button>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:10px;">
            <h3 style="margin:0; font-size:1rem;">📊 สัดส่วนรายจ่าย</h3>
            <select id="chartPeriod" style="width:auto; margin:0; padding:5px;" onchange="render()">
                <option value="month">เดือนนี้</option>
                <option value="today">วันนี้</option>
            </select>
        </div>
        <canvas id="mainChart" style="max-height: 200px;"></canvas>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size:1rem;">🕒 รายการล่าสุด</h3>
        <div id="txList"></div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button class="btn" style="background:#95a5a6;" onclick="exportData()">💾 Backup</button>
        <button class="btn" style="background:#95a5a6;" onclick="document.getElementById('restoreInput').click()">📥 Restore</button>
        <input type="file" id="restoreInput" class="hidden" onchange="importData(event)">
    </div>
</div>

<div id="settingModal" class="modal hidden">
    <div class="card" style="width:90%; max-width:400px; max-height:85vh; overflow-y:auto;">
        <span class="close-x" onclick="closeSettings()">&times;</span>
        <h3 style="margin-top:0;">⚙️ ตั้งค่าคำเดาหมวดหมู่</h3>
        <p style="font-size:0.8rem; color:gray;">ใส่คำที่ใช้บ่อยคั่นด้วยคอมม่า ( , )</p>
        
        <label>🍱 อาหาร:</label>
        <textarea id="kwFood" rows="2"></textarea>
        
        <label>🛵 เดลิเวอรี:</label>
        <textarea id="kwDeli" rows="2"></textarea>
        
        <label>⛽ เดินทาง:</label>
        <textarea id="kwTravel" rows="2"></textarea>
        
        <label>💰 รายได้:</label>
        <textarea id="kwInc" rows="2"></textarea>
        
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn" style="flex:2" onclick="saveSettings()">บันทึกครับ</button>
            <button class="btn" style="flex:1; background:#bdc3c7;" onclick="closeSettings()">ปิด</button>
        </div>
    </div>
</div>

<script>
let tigerData = JSON.parse(localStorage.getItem('tiger_v6_9_entries') || '[]');
let keywords = JSON.parse(localStorage.getItem('tiger_keywords') || JSON.stringify({
    food: 'อาหาร,ข้าว,ราดหน้า,ชาไข่มุก,กาแฟ,น้ำ,ก๋วยเตี๋ยว,กิน,ขนม,ชาบู,สุกี้,หมาล่า,ลาเมง,อเมกาโน่,ลาเต้,ผัดไทย,pizza,kfc',
    deli: 'grab,lineman,foodpanda,เดลิ', 
    travel: 'รถ,น้ำมัน,mrt,bts,แท็กซี่,แกร๊บแท็กซี่,grabtaxi',
    income: 'เงินเดือน,โบนัส,เงินต้น,ได้เงิน,รับเงิน,มีเงินอยู่,รายได้,ขายของได้,ขายสินค้า,ขาย'
}));
let currentMType = 'expense';
let tigerChart = null;

function switchTab(m) {
    document.getElementById('panelChat').classList.toggle('hidden', m !== 'chat');
    document.getElementById('panelManual').classList.toggle('hidden', m !== 'manual');
    document.getElementById('tChat').classList.toggle('active', m === 'chat');
    document.getElementById('tManual').classList.toggle('active', m === 'manual');
}

function openSettings() {
    document.getElementById('kwFood').value = keywords.food;
    document.getElementById('kwDeli').value = keywords.deli;
    document.getElementById('kwTravel').value = keywords.travel;
    document.getElementById('kwInc').value = keywords.income;
    document.getElementById('settingModal').classList.remove('hidden');
}

function closeSettings() { document.getElementById('settingModal').classList.add('hidden'); }

function saveSettings() {
    keywords.food = document.getElementById('kwFood').value;
    keywords.deli = document.getElementById('kwDeli').value;
    keywords.travel = document.getElementById('kwTravel').value;
    keywords.income = document.getElementById('kwInc').value;
    localStorage.setItem('tiger_keywords', JSON.stringify(keywords));
    closeSettings();
    alert("บันทึกการตั้งค่าคำเดาแล้วครับ!");
}

function processChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if(!text) return;
    const amount = (text.match(/\d+(\.\d+)?/) || [0])[0];
    if(amount == 0) return alert("ระบุจำนวนเงินด้วยนะครับ");

    let cat = "อื่นๆ";
    let type = "expense";

    if(keywords.income.split(',').some(w => text.includes(w.trim()))) { cat = "รายได้"; type = "income"; }
    else if(keywords.deli.split(',').some(w => text.toLowerCase().includes(w.trim()))) cat = "เดลิเวอรี";
    else if(keywords.food.split(',').some(w => text.includes(w.trim()))) cat = "อาหาร";
    else if(keywords.travel.split(',').some(w => text.includes(w.trim()))) cat = "เดินทาง";

    addEntry(text, parseFloat(amount), type, cat, "");
    addMsg(text, 'user');
    addMsg(`บันทึก ${cat} ฿${amount} เรียบร้อยครับ`, 'system');
    input.value = "";
}

function addEntry(desc, amount, type, category, note) {
    tigerData.push({ id: Date.now(), desc, amount, type, category, note, date: new Date().toISOString().slice(0, 10) });
    localStorage.setItem('tiger_v6_9_entries', JSON.stringify(tigerData));
    render();
}

function render() {
    const month = new Date().toISOString().slice(0, 7);
    const today = new Date().toISOString().slice(0, 10);
    const mData = tigerData.filter(e => e.date.startsWith(month));
    const tExp = tigerData.filter(e => e.date === today && e.type === 'expense').reduce((s, e) => s + e.amount, 0);
    const inc = mData.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
    const exp = mData.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);

    document.getElementById('totalBal').innerText = `฿${(inc - exp).toLocaleString()}`;
    document.getElementById('txtInc').innerText = `รับ: ฿${inc.toLocaleString()}`;
    document.getElementById('txtExp').innerText = `จ่าย: ฿${exp.toLocaleString()}`;
    document.getElementById('todayStatus').innerText = `วันนี้: ฿${tExp.toLocaleString()}`;

    const icons = { 'อาหาร': '🍱', 'เดลิเวอรี': '🛵', 'เดินทาง': '⛽', 'ช้อปปิ้ง': '🛍️', 'รายได้': '💰', 'อื่นๆ': '✨' };
    document.getElementById('txList').innerHTML = mData.slice().reverse().map(e => `
        <div class="tx-item">
            <div style="flex:1"><strong>${icons[e.category]||'✨'} ${e.desc}</strong><br><small style="opacity:0.5">${e.date}</small></div>
            <div style="text-align:right">
                <span style="color:var(--${e.type}); font-weight:bold;">${e.type==='income'?'+':'-'}฿${e.amount.toLocaleString()}</span><br>
                <button onclick="deleteItem(${e.id})" style="border:none; background:none; cursor:pointer;">🗑️</button>
            </div>
        </div>
    `).join('');
    updateChart();
}

function deleteItem(id) {
    if(confirm('ลบรายการนี้ใช่ไหมครับ?')) {
        tigerData = tigerData.filter(e => e.id !== id);
        localStorage.setItem('tiger_v6_9_entries', JSON.stringify(tigerData));
        render();
    }
}

function updateChart() {
    const period = document.getElementById('chartPeriod').value;
    const filter = period === 'today' ? new Date().toISOString().slice(0, 10) : new Date().toISOString().slice(0, 7);
    const cData = tigerData.filter(e => e.date.startsWith(filter) && e.type === 'expense');
    const cats = {};
    cData.forEach(e => cats[e.category] = (cats[e.category] || 0) + e.amount);

    if(tigerChart) tigerChart.destroy();
    tigerChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
        type: 'doughnut',
        data: { labels: Object.keys(cats), datasets: [{ data: Object.values(cats), backgroundColor: ['#f39c12', '#e74c3c', '#27ae60', '#3498db', '#9b59b6'] }] },
        options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
    });
}

function addMsg(t, type) {
    const box = document.getElementById('chatBox');
    const d = document.createElement('div');
    d.className = `msg ${type}`; d.innerText = t;
    box.appendChild(d); box.scrollTop = box.scrollHeight;
}

function toggleTheme() {
    const b = document.body;
    b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
}

function exportData() {
    const blob = new Blob([JSON.stringify(tigerData)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'tiger_data.json'; a.click();
}

function importData(ev) {
    const f = ev.target.files[0];
    const r = new FileReader();
    r.onload = (e) => {
        tigerData = JSON.parse(e.target.result);
        localStorage.setItem('tiger_v6_9_entries', JSON.stringify(tigerData));
        render(); alert("นำข้อมูลกลับมาให้แล้วครับ!");
    };
    r.readAsText(f);
}

render();
addMsg("น้องเสือกลับมาแล้วครับ! พิมพ์คุยได้ทันทีเลยนะครับ", "system");
</script>
</body>
</html>
