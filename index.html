<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Note App</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Kanit',sans-serif;background:#f6f6f8}
.app{max-width:480px;margin:auto;min-height:100vh;padding-bottom:80px}
.page{display:none;padding:16px}
.page.active{display:block}

.card{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px}
.top{display:flex;gap:10px}
.box{flex:1;padding:14px;border-radius:16px}
.expense{background:#fff1f6;color:#ff4f8b}
.income{background:#f2fffb;color:#38b2a6}
.balance{background:#eef2ff;color:#6366f1}
.money{font-size:22px;font-weight:700}

/* bottom nav */
.nav{
position:fixed;bottom:0;left:0;right:0;background:#fff;
display:flex;justify-content:space-around;padding:10px 0;
border-top:1px solid #eee
}
.nav button{background:none;border:none;font-size:12px}

/* mascot */
.mascot{position:fixed;bottom:90px;left:-80px;font-size:48px;transition:1s linear}
.mascot.run{left:110%}
</style>
</head>

<body>

<div class="mascot" id="mascot">🐻🏺</div>

<div class="app">

<!-- HOME -->
<div class="page active" id="home">
<div class="card">
<h3>สรุป</h3>
<div class="top">
<div class="box expense">รายจ่าย<div id="exp" class="money">0</div></div>
<div class="box income">รายรับ<div id="inc" class="money">0</div></div>
<div class="box balance">คงเหลือ<div id="bal" class="money">0</div></div>
</div>
</div>
</div>

<!-- RECORD -->
<div class="page" id="record">
<div class="card">
<h3>บันทึก</h3>
<input id="desc" placeholder="รายการ">
<input id="amount" type="number" placeholder="จำนวน">
<select id="type">
<option value="expense">รายจ่าย</option>
<option value="income">รายรับ</option>
</select>
<button onclick="addManual()">บันทึก</button>
</div>
</div>

<!-- STATS -->
<div class="page" id="stats">
<div class="card">
<h3>สถิติ</h3>
<canvas id="pie"></canvas>
</div>
</div>

<!-- DONG -->
<div class="page" id="dong">
<div class="card">
<h3>ดงดง</h3>
<p>🐻 ดงดงกำลังช่วยเธอเก็บเงิน</p>
</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="go('home')">🏠<br>Home</button>
<button onclick="go('record')">➕<br>บันทึก</button>
<button onclick="go('stats')">📊<br>สถิติ</button>
<button onclick="go('dong')">🐻<br>ดงดง</button>
</div>

<script>
let data=JSON.parse(localStorage.getItem("donnote")||"[]");

function go(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
run();
}

function run(){
mascot.classList.remove('run');
void mascot.offsetWidth;
mascot.classList.add('run');
}

function save(){
localStorage.setItem("donnote",JSON.stringify(data));
update();
}

function addManual(){
data.push({
desc:desc.value,
amount:+amount.value,
type:type.value
});
save();
desc.value="";amount.value="";
}

function update(){
let inc=0,exp=0;
data.forEach(d=>d.type=="income"?inc+=d.amount:exp+=d.amount);
incEl.innerText=inc;
expEl.innerText=exp;
balEl.innerText=inc-exp;

pie.data.datasets[0].data=[inc,exp];
pie.update();
}

const pie=new Chart(document.getElementById('pie'),{
type:'doughnut',
data:{labels:["รายรับ","รายจ่าย"],
datasets:[{data:[0,0],backgroundColor:["#7fd6c2","#ff8fb3"]}]}
});

update();
</script>

</body>
</html>
