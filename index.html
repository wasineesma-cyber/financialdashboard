<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta charset="UTF-8" />
<title>ดงดง Universe - Scan Edition</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --primary: #FFB3BA; /* สีชมพูพาสเทล */
  --secondary: #BAE1FF; /* สีฟ้าพาสเทล */
  --accent: #FFFFBA; /* สีเหลืองพาสเทล */
  --bg: #f6f7fb;
  --text: #5a5a5a;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Kanit", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: 80px;
}

/* HEADER */
.header {
  background: white;
  padding: 16px;
  font-weight: 700;
  font-size: 20px;
  display: flex;
  gap: 10px;
  align-items: center;
  border-bottom: 2px solid var(--primary);
}

/* SUMMARY CARD - โทนสว่างน่ารัก */
.summary-card {
  background: white;
  margin: 12px;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 4px 15px rgba(255, 179, 186, 0.3);
}
.total-label { font-size: 0.8rem; color: #888; }
.total-bal { font-size: 2.2rem; font-weight: 800; color: #ff85a2; margin: 5px 0; }
.sub-summary { display: flex; justify-content: space-around; margin-top: 15px; font-size: 0.9rem; }

/* CHAT & BUTTONS */
.card {
  background: white;
  margin: 12px;
  padding: 16px;
  border-radius: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.03);
}
input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #eee;
  box-sizing: border-box;
  margin-top: 10px;
  outline: none;
  background: #fafafa;
}

.scan-btn {
  background: var(--secondary);
  border: none;
  padding: 12px;
  border-radius: 12px;
  width: 100%;
  margin-top: 10px;
  font-weight: bold;
  color: #4a90e2;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
}

/* LIST */
.item-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #f9f9f9;
}

/* DONGDONG */
#dong {
  position: fixed;
  bottom: 90px;
  left: -80px;
  font-size: 56px;
  animation: run 12s linear infinite;
  cursor: pointer;
  z-index: 100;
}
@keyframes run { from{left:-80px} to{left:110%} }

/* SCAN ANIMATION OVERLAY */
.scanner-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  color: white;
}
.scan-line {
  width: 80%;
  height: 2px;
  background: var(--primary);
  box-shadow: 0 0 15px var(--primary);
  position: absolute;
  animation: scanning 2s ease-in-out infinite;
}
@keyframes scanning {
  0% { top: 30%; }
  50% { top: 70%; }
  100% { top: 30%; }
}
.hidden { display: none; }
</style>
</head>

<body>

<div class="header">🐻 ดงดง Universe</div>

<div class="summary-card">
  <div class="total-label">ยอดคงเหลือของวันนี้</div>
  <div class="total-bal" id="total-bal">฿0</div>
  <div class="sub-summary">
    <div style="color: #4caf50;">รายรับ<br><b id="inc">0</b></div>
    <div style="color: #ff5252;">รายจ่าย<br><b id="exp">0</b></div>
  </div>
</div>

<div class="card">
  <b>💬 คุยกับดงดง</b>
  <input id="chat" placeholder="พิมพ์รายการ เช่น 'ข้าวเช้า 50'"/>
  
  <button class="scan-btn" onclick="triggerScan()">
    📷 แสกนบิล / ใบเสร็จ
  </button>
  <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="startScanningAnimation()">
</div>

<div class="card">
  <b>📜 รายการล่าสุด</b>
  <div id="list" style="margin-top:10px;"></div>
</div>

<div id="scanOverlay" class="scanner-overlay hidden">
  <div style="border: 2px solid white; width: 250px; height: 350px; position: relative; border-radius: 15px;">
    <div class="scan-line"></div>
  </div>
  <p style="margin-top: 20px;">กำลังอ่านยอดเงินจากบิล... 🐻🔍</p>
</div>

<div id="dong">🐻</div>

<script>
let data = JSON.parse(localStorage.getItem('dongdong_v9_data') || '[]');
const chat = document.getElementById("chat");

function triggerScan() {
  document.getElementById('fileInput').click();
}

function startScanningAnimation() {
  const overlay = document.getElementById('scanOverlay');
  overlay.classList.remove('hidden');

  // จำลองการใช้ AI อ่านยอดเงิน (ในแอปจริงต้องส่งรูปไป API)
  setTimeout(() => {
    overlay.classList.add('hidden');
    // สุ่มยอดเงินเพื่อเป็นตัวอย่าง (ในแอปจริงจะดึงจากรูป)
    const mockAmount = Math.floor(Math.random() * 450) + 50;
    const confirmAdd = confirm(`ดงดงอ่านยอดเงินได้ ฿${mockAmount} \nต้องการบันทึกเป็นรายจ่ายใช่ไหมครับ?`);
    
    if(confirmAdd) {
      addEntry("แสกนบิล", mockAmount, "expense", "อื่นๆ ✨");
    }
  }, 3000);
}

chat.addEventListener("keypress", e => {
  if(e.key === "Enter") {
    const msg = chat.value;
    const amount = Number(msg.match(/\d+/));
    if(!amount) return;

    const [cat, type] = detectCategory(msg);
    addEntry(msg, amount, type, cat);
    chat.value = "";
  }
});

function detectCategory(text) {
  text = text.toLowerCase();
  if(text.includes("ชา")||text.includes("ข้าว")||text.includes("กิน")) return ["อาหาร 🍱","expense"];
  if(text.includes("รถ")||text.includes("bts")) return ["เดินทาง ⛽","expense"];
  if(text.includes("เงินเดือน")||text.includes("ขาย")) return ["รายรับ 💰","income"];
  return ["อื่นๆ ✨","expense"];
}

function addEntry(msg, amount, type, cat) {
  data.push({ id: Date.now(), msg, amount, type, cat, date: new Date().toLocaleDateString() });
  localStorage.setItem('dongdong_v9_data', JSON.stringify(data));
  render();
}

function render() {
  let inc = 0, exp = 0;
  const listEl = document.getElementById("list");
  listEl.innerHTML = "";

  data.slice().reverse().forEach(d => {
    const div = document.createElement("div");
    div.className = "item-row";
    div.innerHTML = `
      <div><strong>${d.msg}</strong><br><small style="color:#aaa">${d.cat}</small></div>
      <div style="color:${d.type==='income'?'#4caf50':'#ff5252'}">฿${d.amount.toLocaleString()}</div>
    `;
    listEl.appendChild(div);
    if(d.type === "income") inc += d.amount; else exp += d.amount;
  });

  document.getElementById("inc").textContent = inc.toLocaleString();
  document.getElementById("exp").textContent = exp.toLocaleString();
  document.getElementById("total-bal").textContent = `฿${(inc - exp).toLocaleString()}`;
}

const dong = document.getElementById("dong");
const hour = new Date().getHours();
if(hour < 12) dong.textContent = "🐻‍❄️";
else if(hour < 18) dong.textContent = "🐻";
else dong.textContent = "🐻‍🌙";

render();
</script>

</body>
</html>
