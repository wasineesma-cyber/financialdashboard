<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Note</title>

<style>
:root{
  --bg:#fbfbfd;
  --card:#ffffff;
  --text:#2f2f2f;
  --border:#ededf3;
}

body{
  margin:0;
  font-family:'Kanit',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:480px;
  margin:auto;
  padding:16px;
  padding-bottom:90px;
}

/* header */
.header{
  text-align:center;
  padding:20px 0;
}

/* card */
.card{
  background:var(--card);
  border-radius:18px;
  padding:18px;
  margin-bottom:14px;
  border:1px solid var(--border);
}

/* pages */
.page{display:none;}
.page.active{display:block;}

/* nav */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  font-size:12px;
}

/* 🐻 mascot */
.mascot{
  position:fixed;
  bottom:85px;
  left:-90px;
  font-size:50px;
  transition:1s linear;
  z-index:999;
}

/* run */
.mascot.run{
  left:110%;
}

/* jump */
@keyframes jump{
  0%{transform:translateY(0)}
  50%{transform:translateY(-25px)}
  100%{transform:translateY(0)}
}
.mascot.jump{
  animation:jump .6s ease;
}

/* speech bubble */
.speech{
  position:fixed;
  bottom:140px;
  left:20px;
  background:#fff;
  padding:10px 14px;
  border-radius:14px;
  border:1px solid var(--border);
  font-size:13px;
  opacity:0;
  transition:.4s;
}

.speech.show{opacity:1;}
</style>
</head>

<body>

<div class="mascot" id="mascot">🐻</div>
<div class="speech" id="speech">สู้ ๆ นะ!</div>

<div class="container">

<div class="header">
<h1>Don Note</h1>
</div>

<div id="summary" class="page active">
  <div class="card">🏠 หน้าสรุป</div>
</div>

<div id="analysis" class="page">
  <div class="card">📊 วิเคราะห์</div>
</div>

<div id="category" class="page">
  <div class="card">🗂️ หมวด</div>
</div>

<div id="list" class="page">
  <div class="card">📋 รายการ</div>
</div>

<div id="settings" class="page">
  <div class="card">⚙️ ตั้งค่า</div>
</div>

</div>

<div class="nav">
  <div onclick="go('summary')">🏠<br>สรุป</div>
  <div onclick="go('analysis')">📊<br>วิเคราะห์</div>
  <div onclick="go('category')">🗂️<br>หมวด</div>
  <div onclick="go('list')">📋<br>รายการ</div>
  <div onclick="go('settings')">⚙️<br>ตั้งค่า</div>
</div>

<script>
const mascot=document.getElementById('mascot');
const speech=document.getElementById('speech');

const phrases=[
"เก็บเงินเก่งมาก 🐻",
"สู้ ๆ นะ 🤍",
"อย่าลืมจดรายจ่าย",
"วันนี้ใช้เงินไปเท่าไรน้า",
"เราจะรวยไปด้วยกัน!"
];

function randomSpeech(){
  speech.textContent=phrases[Math.floor(Math.random()*phrases.length)];
  speech.classList.add('show');
  setTimeout(()=>speech.classList.remove('show'),2500);
}

/* เปลี่ยนชุดตามเวลา */
function setOutfit(){
  const h=new Date().getHours();
  if(h<12) mascot.textContent="🐻🧣";
  else if(h<18) mascot.textContent="🐻🏺";
  else mascot.textContent="🐻🌙";
}
setOutfit();

/* เปลี่ยนหน้า */
function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  mascot.classList.remove('run','jump');
  void mascot.offsetWidth;
  mascot.classList.add('run','jump');

  randomSpeech();
}
</script>

</body>
</html>
