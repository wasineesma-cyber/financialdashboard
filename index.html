<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Note</title>

<style>
:root{
  --bg:#fbfbfd;
  --card:#ffffff;
  --text:#2f2f2f;
  --border:#ededf3;

  --primary:#111;
  --income:#4fd1b5;
  --expense:#ff8fa3;
}

body{
  margin:0;
  font-family:'Kanit',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:480px;
  margin:auto;
  padding:16px;
  padding-bottom:90px;
}

/* header */
.header{
  text-align:center;
  padding:20px 0 8px;
}

.header h1{
  margin:0;
  font-size:26px;
}

/* card */
.card{
  background:var(--card);
  border-radius:18px;
  padding:18px;
  margin-bottom:14px;
  border:1px solid var(--border);
}

/* balance */
.balance{
  font-size:34px;
  font-weight:700;
  margin:6px 0;
}

.row{
  display:flex;
  justify-content:space-between;
}

/* nav */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  font-size:12px;
}

.nav div{
  text-align:center;
  cursor:pointer;
}

/* pages */
.page{display:none;}
.page.active{display:block;}

/* mascot */
.mascot{
  position:fixed;
  bottom:80px;
  left:-80px;
  font-size:42px;
  transition:1s linear;
  z-index:999;
}
.mascot.run{
  left:110%;
}
</style>
</head>

<body>

<div class="mascot" id="mascot">🐰</div>

<div class="container">

<div class="header">
<h1>Don Note</h1>
</div>

<!-- SUMMARY -->
<div id="summary" class="page active">
  <div class="card">
    <div>ยอดเงินคงเหลือ</div>
    <div class="balance">฿12,450</div>
    <div class="row">
      <span style="color:var(--income)">รายรับ ฿20,000</span>
      <span style="color:var(--expense)">รายจ่าย ฿7,550</span>
    </div>
  </div>
</div>

<!-- ANALYSIS -->
<div id="analysis" class="page">
  <div class="card">
    📊 กราฟการใช้เงิน
  </div>
</div>

<!-- CATEGORY -->
<div id="category" class="page">
  <div class="card">
    🍱 อาหาร<br>
    🚗 เดินทาง<br>
    🛍️ ช้อปปิ้ง<br>
    🧾 บิล<br>
    🎮 ความบันเทิง<br>
    💊 สุขภาพ<br>
    🎁 อื่นๆ
  </div>
</div>

<!-- LIST -->
<div id="list" class="page">
  <div class="card">
    ☕ กาแฟ — ฿60<br>
    🍜 ข้าว — ฿80
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
  <div class="card">
    ⚙️ ตั้งค่าแอพ
  </div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="go('summary')">🏠<br>สรุป</div>
  <div onclick="go('analysis')">📊<br>วิเคราะห์</div>
  <div onclick="go('category')">🗂️<br>หมวด</div>
  <div onclick="go('list')">📋<br>รายการ</div>
  <div onclick="go('settings')">⚙️<br>ตั้งค่า</div>
</div>

<script>
function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  const m=document.getElementById('mascot');
  m.classList.remove('run');
  void m.offsetWidth;
  m.classList.add('run');
}
</script>

</body>
</html>
