<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>น้องเสือช่วยจด v7.0 - Full Categories</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #fffcf9; --card: rgba(255, 255, 255, 0.98); --text: #2d3436;
    --accent: #f39c12; --income: #27ae60; --expense: #e74c3c; --border: #f1f2f6;
}
[data-theme="dark"] {
    --bg: #1e272e; --card: rgba(47, 54, 64, 0.95); --text: #f5f6fa; --border: #353b48;
}
body { font-family: 'Inter', 'Kanit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; transition: 0.3s; }
.container { max-width: 500px; margin: auto; padding: 15px; }
.card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); box-shadow: 0 8px 20px rgba(0,0,0,0.06); position: relative; }
.tab-group { display: flex; gap: 8px; margin-bottom: 15px; }
.tab { flex: 1; padding: 10px; border-radius: 14px; border: 1px solid var(--border); background: var(--card); cursor: pointer; text-align: center; font-weight: bold; font-size: 0.8rem; }
.tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 14px; cursor: pointer; font-weight: bold; transition: 0.2s; }
input, select, textarea { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 12px; box-sizing: border-box; outline: none; }
.chat-box { height: 180px; overflow-y: auto; padding: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
.msg { padding: 10px 16px; border-radius: 18px; font-size: 0.85rem; max-width: 85%; }
.user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
.system { background: var(--border); align-self: flex-start; border-bottom-left-radius: 2px; }
.tx-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.hidden { display: none !important; }
.modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:2000; backdrop-filter: blur(4px); }
.close-x { position: absolute; top: 15px; right: 15px; font-size: 1.5rem; cursor: pointer; }
</style>
</head>
<body data-theme="light">

<div class="container">
    <div style="text-align: center; padding: 10px;">
        <h2 style="margin:0;">🐯 น้องเสือช่วยจด</h2>
        <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 0.75rem; color:var(--text); opacity:0.6;">🌓 สลับโหมด</button>
    </div>

    <div class="card" style="background: linear-gradient(135deg, #f39c12, #e67e22); color: white; border: none;">
        <div style="display:flex; justify-content: space-between;"><small>คงเหลือเดือนนี้</small><small id="todayStatus">วันนี้: ฿0</small></div>
        <div id="totalBal" style="font-size: 2.2rem; font-weight: bold; margin: 8px 0;">฿0</div>
        <div style="display:flex; justify-content: space-between; font-size: 0.85rem; opacity: 0.9;"><span id="txtInc">รับ: ฿0</span><span id="txtExp">จ่าย: ฿0</span></div>
    </div>

    <div class="card">
        <div class="tab-group">
            <div class="tab active" onclick="switchTab('chat')" id="tChat">💬 แชต</div>
            <div class="tab" onclick="switchTab('manual')" id="tManual">📝 กรอกเอง</div>
            <div class="tab" onclick="openSettings()">⚙️ ตั้งค่าคำเดา</div>
        </div>

        <div id="panelChat">
            <div id="chatBox" class="chat-box"></div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="chatInput" placeholder="พิมพ์รายการ..." onkeypress="if(event.key==='Enter') processChat()">
                <button class="btn" onclick="processChat()">ส่ง</button>
            </div>
        </div>

        <div id="panelManual" class="hidden">
            <div style="display:flex; gap:8px; margin-bottom:12px;">
                <button class="tab active" id="mBtnExp" style="background:var(--expense); color:white;" onclick="setManualType('expense')">รายจ่าย</button>
                <button class="tab" id="mBtnInc" onclick="setManualType('income')">รายรับ</button>
            </div>
            <input type="text" id="mDesc" placeholder="รายการ">
            <input type="number" id="mAmount" placeholder="จำนวนเงิน">
            <select id="mCat"></select> <button class="btn" style="width:100%" onclick="processManual()">บันทึกข้อมูลครับ</button>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:10px;">
            <h3 id="chartTitle" style="margin:0; font-size:0.95rem;">📊 สัดส่วนรายจ่าย</h3>
            <div style="display:flex; gap:5px;">
                <button onclick="setChartType('expense')" id="cBtnExp" style="font-size:0.7rem; cursor:pointer; padding:2px 8px; border-radius:10px; border:1px solid var(--expense); background:var(--expense); color:white;">จ่าย</button>
                <button onclick="setChartType('income')" id="cBtnInc" style="font-size:0.7rem; cursor:pointer; padding:2px 8px; border-radius:10px; border:1px solid var(--border); background:none; color:var(--text);">รับ</button>
            </div>
        </div>
        <canvas id="mainChart" style="max-height: 180px;"></canvas>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size:0.95rem;">🕒 รายการล่าสุด</h3>
        <div id="txList"></div>
    </div>
</div>

<div id="settingModal" class="modal hidden">
    <div class="card" style="width:90%; max-width:400px; max-height:85vh; overflow-y:auto;">
        <span class="close-x" onclick="closeSettings()">&times;</span>
        <h3 style="margin-top:0;">⚙️ ตั้งค่าคำเดาหมวดหมู่</h3>
        <div id="keywordSettingsArea"></div>
        <button class="btn" style="width:100%; margin-top:10px;" onclick="saveSettings()">บันทึกข้อมูลครับ</button>
    </div>
</div>

<script>
const categories = {
    expense: {
        'อาหาร': {icon:'🍱', keywords:'ข้าว,ก๋วยเตี๋ยว,กาแฟ,น้ำ,ขนม'},
        'เดลิเวอรี': {icon:'🛵', keywords:'grab,lineman,foodpanda'},
        'เดินทาง': {icon:'⛽', keywords:'น้ำมัน,รถ,mrt,bts,แท็กซี่'},
        'ช้อปปิ้ง': {icon:'🛍️', keywords:'เสื้อผ้า,รองเท้า,shopee,lazada'},
        'ค่าน้ำค่าไฟ': {icon:'💧', keywords:'ค่าน้ำ,ค่าไฟ,เน็ต,มือถือ'},
        'ออกกำลังกาย': {icon:'💪', keywords:'ฟิตเนส,ยิม,gym,วิ่ง,กีฬา'},
        'สุขภาพ': {icon:'🏥', keywords:'ค่าหมอ,ยา,โรงพยาบาล,คลินิก'},
        'อื่นๆ': {icon:'✨', keywords:''}
    },
    income: {
        'รายได้': {icon:'💰', keywords:'เงินเดือน,โบนัส,ขายของ'},
        'อื่นๆ': {icon:'✨', keywords:''}
    }
};

let tigerData = JSON.parse(localStorage.getItem('tiger_v7_entries') || '[]');
let userKeywords = JSON.parse(localStorage.getItem('tiger_keywords_v7') || '{}');
let currentMType = 'expense';
let viewChartType = 'expense';
let tigerChart = null;

function init() {
    // โหลด keywords เริ่มต้นถ้ายังไม่มี
    if (Object.keys(userKeywords).length === 0) {
        for(let type in categories) {
            for(let cat in categories[type]) {
                userKeywords[cat] = categories[type][cat].keywords;
            }
        }
    }
    updateCatDropdown();
    renderKeywordSettings();
    render();
}

function updateCatDropdown() {
    const select = document.getElementById('mCat');
    select.innerHTML = Object.entries(categories[currentMType]).map(([name, obj]) => 
        `<option value="${name}">${obj.icon} ${name}</option>`
    ).join('');
}

function renderKeywordSettings() {
    const area = document.getElementById('keywordSettingsArea');
    area.innerHTML = Object.keys(userKeywords).map(cat => `
        <label style="font-size:0.85rem; font-weight:bold;">${cat}:</label>
        <textarea id="kw_${cat}" rows="1" style="padding:8px; font-size:0.8rem;">${userKeywords[cat]}</textarea>
    `).join('');
}

function setManualType(t) {
    currentMType = t;
    document.getElementById('mBtnExp').classList.toggle('active', t === 'expense');
    document.getElementById('mBtnInc').classList.toggle('active', t === 'income');
    document.getElementById('mBtnExp').style.background = t === 'expense' ? 'var(--expense)' : 'none';
    document.getElementById('mBtnInc').style.background = t === 'income' ? 'var(--income)' : 'none';
    updateCatDropdown();
}

function setChartType(t) {
    viewChartType = t;
    document.getElementById('chartTitle').innerText = t === 'expense' ? '📊 สัดส่วนรายจ่าย' : '📊 สัดส่วนรายรับ';
    document.getElementById('cBtnExp').style.background = t === 'expense' ? 'var(--expense)' : 'none';
    document.getElementById('cBtnExp').style.color = t === 'expense' ? 'white' : 'var(--text)';
    document.getElementById('cBtnInc').style.background = t === 'income' ? 'var(--income)' : 'none';
    document.getElementById('cBtnInc').style.color = t === 'income' ? 'white' : 'var(--text)';
    updateChart();
}

function switchTab(m) {
    document.getElementById('panelChat').classList.toggle('hidden', m !== 'chat');
    document.getElementById('panelManual').classList.toggle('hidden', m !== 'manual');
    document.getElementById('tChat').classList.toggle('active', m === 'chat');
    document.getElementById('tManual').classList.toggle('active', m === 'manual');
}

function processChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if(!text) return;
    const amount = (text.match(/\d+(\.\d+)?/) || [0])[0];
    if(amount == 0) return alert("รบกวนระบุจำนวนเงินด้วยนะครับ");

    let foundCat = "อื่นๆ";
    let foundType = "expense";

    // วนลูปหาจาก Keywords ที่ตั้งไว้
    for (let cat in userKeywords) {
        const words = userKeywords[cat].split(',');
        if (words.some(w => w.trim() && text.toLowerCase().includes(w.trim().toLowerCase()))) {
            foundCat = cat;
            // เช็คว่าเป็นหมวดรายได้หรือไม่
            if (categories.income[cat]) foundType = "income";
            break;
        }
    }

    addEntry(text, parseFloat(amount), foundType, foundCat);
    addMsg(text, 'user');
    addMsg(`บันทึก ${foundCat} ฿${amount} เรียบร้อยครับ`, 'system');
    input.value = "";
}

function addEntry(desc, amount, type, category) {
    tigerData.push({ id: Date.now(), desc, amount, type, category, date: new Date().toISOString().slice(0, 10) });
    localStorage.setItem('tiger_v7_entries', JSON.stringify(tigerData));
    render();
}

function render() {
    const month = new Date().toISOString().slice(0, 7);
    const today = new Date().toISOString().slice(0, 10);
    const mData = tigerData.filter(e => e.date.startsWith(month));
    const tExp = mData.filter(e => e.date === today && e.type === 'expense').reduce((s, e) => s + e.amount, 0);
    const inc = mData.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
    const exp = mData.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);

    document.getElementById('totalBal').innerText = `฿${(inc - exp).toLocaleString()}`;
    document.getElementById('txtInc').innerText = `รับ: ฿${inc.toLocaleString()}`;
    document.getElementById('txtExp').innerText = `จ่าย: ฿${exp.toLocaleString()}`;
    document.getElementById('todayStatus').innerText = `วันนี้: ฿${tExp.toLocaleString()}`;

    const allIcons = {...categories.expense, ...categories.income};
    document.getElementById('txList').innerHTML = mData.slice().reverse().slice(0, 10).map(e => `
        <div class="tx-item">
            <div style="flex:1"><strong>${allIcons[e.category]?.icon || '✨'} ${e.desc}</strong><br><small style="opacity:0.5">${e.date}</small></div>
            <div style="text-align:right">
                <span style="color:var(--${e.type}); font-weight:bold;">${e.type==='income'?'+':'-'}฿${e.amount.toLocaleString()}</span><br>
                <button onclick="deleteItem(${e.id})" style="border:none; background:none; cursor:pointer; opacity:0.3;">🗑️</button>
            </div>
        </div>
    `).join('');
    updateChart();
}

function updateChart() {
    const month = new Date().toISOString().slice(0, 7);
    const cData = tigerData.filter(e => e.date.startsWith(month) && e.type === viewChartType);
    const summary = {};
    cData.forEach(e => summary[e.category] = (summary[e.category] || 0) + e.amount);

    if(tigerChart) tigerChart.destroy();
    const ctx = document.getElementById('mainChart').getContext('2d');
    tigerChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: Object.keys(summary),
            datasets: [{
                data: Object.values(summary),
                backgroundColor: ['#f39c12', '#e74c3c', '#27ae60', '#3498db', '#9b59b6', '#1abc9c', '#34495e']
            }]
        },
        options: { cutout: '65%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
    });
}

function openSettings() { document.getElementById('settingModal').classList.remove('hidden'); }
function closeSettings() { document.getElementById('settingModal').classList.add('hidden'); }
function saveSettings() {
    for(let cat in userKeywords) {
        userKeywords[cat] = document.getElementById(`kw_${cat}`).value;
    }
    localStorage.setItem('tiger_keywords_v7', JSON.stringify(userKeywords));
    closeSettings();
    alert("บันทึกการตั้งค่าแล้วครับ!");
}

function addMsg(t, type) {
    const box = document.getElementById('chatBox');
    const d = document.createElement('div');
    d.className = `msg ${type}`; d.innerText = t;
    box.appendChild(d); box.scrollTop = box.scrollHeight;
}

function toggleTheme() {
    const b = document.body;
    b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
}

function deleteItem(id) {
    if(confirm('ลบรายการนี้ใช่ไหมครับ?')) {
        tigerData = tigerData.filter(e => e.id !== id);
        localStorage.setItem('tiger_v7_entries', JSON.stringify(tigerData));
        render();
    }
}

init();
addMsg("สวัสดีครับ! น้องเสือ v7.0 พร้อมจดทุกหมวดหมู่แล้วครับ", "system");
</script>
</body>
</html>
