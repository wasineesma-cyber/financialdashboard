<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เหมียวบัญชี v5 - Ultra Smart</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #f8fafc; --card: rgba(255, 255, 255, 0.9); --text: #0f172a;
    --accent: #6366f1; --income: #10b981; --expense: #ef4444; --border: #e2e8f0;
}
[data-theme="dark"] {
    --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); --text: #f8fafc; --border: #334155;
}
body { font-family: 'Inter', 'Kanit', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; padding-bottom: 50px; }
.container { max-width: 500px; margin: auto; padding: 15px; }
.card { background: var(--card); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
.header { text-align: center; padding: 20px 0; }
.tab-group { display: flex; gap: 8px; margin-bottom: 15px; }
.tab { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); cursor: pointer; text-align: center; font-weight: bold; }
.tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 14px; cursor: pointer; font-weight: bold; }
input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 10px; box-sizing: border-box; outline: none; }
.chat-box { height: 180px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
.msg { padding: 10px 14px; border-radius: 16px; font-size: 0.9rem; max-width: 80%; }
.user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
.system { background: var(--bg); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 2px; }
.tx-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
.hidden { display: none; }
</style>
</head>
<body data-theme="light">

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 1.8rem;">🐱 เหมียวบัญชี <small style="font-size: 0.8rem; opacity: 0.6;">v5</small></h1>
        <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem; margin-top: 5px;">🌓</button>
    </div>

    <div class="card" style="background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none;">
        <small style="opacity:0.8">ยอดคงเหลือเดือนนี้</small>
        <div id="totalBal" style="font-size: 2rem; font-weight: bold;">฿0</div>
        <div style="display:flex; justify-content: space-between; margin-top: 10px; font-size: 0.8rem;">
            <span id="txtInc">รับ: ฿0</span>
            <span id="txtExp">จ่าย: ฿0</span>
        </div>
    </div>

    <div class="card">
        <div class="tab-group">
            <div class="tab active" id="tab1" onclick="switchTab('chat')">💬 แชต</div>
            <div class="tab" id="tab2" onclick="switchTab('manual')">📝 กรอกเอง</div>
        </div>

        <div id="panelChat">
            <div id="chatBox" class="chat-box"></div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="chatInput" placeholder="ซื้อราดหน้า 60, สั่ง Grab 150..." onkeypress="if(event.key==='Enter') processChat()">
                <button class="btn" onclick="processChat()">ส่ง</button>
            </div>
        </div>

        <div id="panelManual" class="hidden">
            <input type="text" id="mDesc" placeholder="ชื่อรายการ เช่น ค่าไฟ">
            <input type="number" id="mAmount" placeholder="จำนวนเงิน">
            <select id="mCat">
                <option value="อาหาร">🍱 อาหาร/เครื่องดื่ม</option>
                <option value="เดลิเวอรี">🛵 แบรนด์เดลิเวอรี</option>
                <option value="ช้อปปิ้ง">🛍️ ช้อปปิ้ง</option>
                <option value="เดินทาง">⛽ เดินทาง/น้ำมัน</option>
                <option value="ที่พัก">🏠 ที่พัก/บิล</option>
                <option value="รายได้">💰 รายได้/เงินตั้งต้น</option>
            </select>
            <button class="btn" style="width:100%" onclick="processManual()">บันทึกแมนนวล</button>
        </div>
    </div>

    <div class="card">
        <h3 style="font-size: 1rem; margin-top: 0;">📊 สัดส่วนรายจ่าย</h3>
        <canvas id="pieChart" style="max-height: 220px;"></canvas>
    </div>

    <div class="card">
        <h3 style="font-size: 1rem; margin-top: 0;">🕒 ประวัติรายการ</h3>
        <div id="txList"></div>
    </div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem('meow_data_v5') || '[]');
let chart;

function switchTab(mode) {
    document.getElementById('panelChat').classList.toggle('hidden', mode !== 'chat');
    document.getElementById('panelManual').classList.toggle('hidden', mode !== 'manual');
    document.getElementById('tab1').classList.toggle('active', mode === 'chat');
    document.getElementById('tab2').classList.toggle('active', mode === 'manual');
}

function toggleTheme() {
    const b = document.body;
    b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
}

function processChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if(!text) return;

    const amount = (text.match(/\d+(\.\d+)?/) || [0])[0];
    if(amount == 0) return alert("ระบุจำนวนเงินด้วยจ้า");

    // ระบบเดาคำที่ฉลาดขึ้น
    const isIncome = ['รับ','ได้','เงินเข้า','เงินต้น','ยกมา','เงินเดือน'].some(w => text.includes(w));
    let cat = "อื่นๆ";
    if(isIncome) cat = "รายได้";
    else if(['grab','lineman','foodpanda','shopeefood','เดลิ'].some(w => text.toLowerCase().includes(w))) cat = "เดลิเวอรี";
    else if(['กิน','ข้าว','น้ำ','ราดหน้า','ชาไข่มุก','อาหาร','ก๋วยเตี๋ยว','กะเพรา','มัทฉะ','กาแฟ'].some(w => text.includes(w))) cat = "อาหาร";
    else if(['รถ','น้ำมัน','mrt','bts','แท็กซี่'].some(w => text.includes(w))) cat = "เดินทาง";
    else if(['ของ','ช้อป','ชุด','เสื้อ'].some(w => text.includes(w))) cat = "ช้อปปิ้ง";

    addEntry(text, parseFloat(amount), isIncome ? 'income' : 'expense', cat);
    addMsg(text, 'user');
    addMsg(`จด ${cat} ฿${amount} ให้แล้วเมี๊ยว!`, 'system');
    input.value = "";
}

function processManual() {
    const desc = document.getElementById('mDesc').value;
    const amount = document.getElementById('mAmount').value;
    const cat = document.getElementById('mCat').value;
    if(!desc || !amount) return alert("กรอกให้ครบนะ");
    
    addEntry(desc, parseFloat(amount), cat === 'รายได้' ? 'income' : 'expense', cat);
    alert("บันทึกสำเร็จเมี๊ยว!");
    document.getElementById('mDesc').value = "";
    document.getElementById('mAmount').value = "";
    switchTab('chat');
}

function addEntry(desc, amount, type, cat) {
    entries.push({ id: Date.now(), desc, amount, type, category: cat, date: new Date().toISOString().slice(0, 10) });
    localStorage.setItem('meow_data_v5', JSON.stringify(entries));
    render();
}

function deleteEntry(id) {
    if(confirm('ลบรายการนี้ใช่ไหม?')) {
        entries = entries.filter(e => e.id !== id);
        localStorage.setItem('meow_data_v5', JSON.stringify(entries));
        render();
    }
}

function addMsg(text, type) {
    const box = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function render() {
    const month = new Date().toISOString().slice(0, 7);
    const mData = entries.filter(e => e.date.startsWith(month));
    const inc = mData.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
    const exp = mData.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);

    document.getElementById('totalBal').innerText = `฿${(inc - exp).toLocaleString()}`;
    document.getElementById('txtInc').innerText = `รับ: ฿${inc.toLocaleString()}`;
    document.getElementById('txtExp').innerText = `จ่าย: ฿${exp.toLocaleString()}`;

    const icons = { 'อาหาร': '🍱', 'เดลิเวอรี': '🛵', 'ช้อปปิ้ง': '🛍️', 'เดินทาง': '⛽', 'ที่พัก': '🏠', 'รายได้': '💰', 'อื่นๆ': '✨' };

    document.getElementById('txList').innerHTML = mData.slice().reverse().map(e => `
        <div class="tx-item">
            <div style="flex:1">
                <strong>${icons[e.category] || '✨'} ${e.desc}</strong><br>
                <small style="opacity:0.5">${e.date} | ${e.category}</small>
            </div>
            <div style="text-align:right">
                <span style="color:var(--${e.type}); font-weight:bold;">${e.type === 'income' ? '+' : '-'}฿${e.amount}</span><br>
                <button onclick="deleteEntry(${e.id})" style="border:none; background:none; cursor:pointer; font-size: 0.8rem;">🗑️</button>
            </div>
        </div>
    `).join('');

    updateChart(mData);
}

function updateChart(data) {
    const cats = {};
    data.filter(e => e.type === 'expense').forEach(e => cats[e.category] = (cats[e.category] || 0) + e.amount);
    if(chart) chart.destroy();
    chart = new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: {
            labels: Object.keys(cats),
            datasets: [{ data: Object.values(cats), backgroundColor: ['#6366f1', '#f472b6', '#10b981', '#fbbf24', '#f87171', '#a78bfa'] }]
        },
        options: { cutout: '65%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } } }
    });
}

render();
addMsg("เมี๊ยว! ลองพิมพ์ 'ซื้อราดหน้า 60' หรือ 'สั่ง Grab 120' ดูนะ", "system");
</script>
</body>
</html>
