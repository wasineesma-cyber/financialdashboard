<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เหมียวบัญชี</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<meta name="theme-color" content="#000000">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#e5e7eb;
  --border:#2a2a2a;
  --accent:#6366f1;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  padding:20px;
  border-bottom:1px solid var(--border);
}
.container{max-width:900px;margin:auto;padding:20px}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}
.btn{
  padding:8px 12px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#000;
  color:#fff;
  width:100%;
}
.summary{display:grid;gap:12px}
.amount{font-size:1.3rem;font-weight:600}
.income{color:#22c55e}
.expense{color:#ef4444}
.balance{color:#3b82f6}
.tx-item{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid var(--border);
}
.chat-box{
  height:220px;
  overflow-y:auto;
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
  background:#000;
}
.msg{margin-bottom:8px}
.user{text-align:right}
.system{color:#9ca3af}
</style>
</head>

<body>

<header>
  <h2>🐱 เหมียวบัญชี</h2>
</header>

<div class="container">

<div class="card summary">
  <div>รายรับเดือนนี้ <div id="totalIncome" class="amount income">฿0</div></div>
  <div>รายจ่ายเดือนนี้ <div id="totalExpense" class="amount expense">฿0</div></div>
  <div>คงเหลือ <div id="totalBalance" class="amount balance">฿0</div></div>
</div>

<div class="card">
  <h3>สรุปวันนี้</h3>
  <div>รายรับวันนี้: <span id="todayIncome" class="income">฿0</span></div>
  <div>รายจ่ายวันนี้: <span id="todayExpense" class="expense">฿0</span></div>
</div>

<div class="card">
  <h3>แชตบันทึกรายการ</h3>
  <div id="chatBox" class="chat-box"></div>
  <div style="display:flex;gap:8px;">
    <input type="text" id="chatInput" placeholder="เช่น สั่งแกร๊บ 120">
    <button class="btn" onclick="sendChat()">ส่ง</button>
  </div>
</div>

<div class="card">
  <h3>ประวัติ</h3>
  <div id="txList"></div>
</div>

<div class="card">
  <h3>กราฟรายรับ/รายจ่าย</h3>
  <canvas id="barChart"></canvas>
</div>

<div class="card">
  <h3>สัดส่วนค่าใช้จ่ายรายเดือน</h3>
  <canvas id="pieChart"></canvas>
</div>

</div>

<script>

let entries = JSON.parse(localStorage.getItem('meow_data') || '[]');
let barChart, pieChart;

function save(){
  localStorage.setItem('meow_data', JSON.stringify(entries));
}

function addMessage(text,type){
  const div=document.createElement('div');
  div.className='msg '+type;
  div.innerHTML= type==='user'
    ? `<b>คุณ:</b> ${text}`
    : `<b>ระบบ:</b> ${text}`;
  chatBox.appendChild(div);
  chatBox.scrollTop=chatBox.scrollHeight;
}

/* ====== AI Keyword Engine ====== */

function detectType(text){
  const incomeWords=['รับ','ได้','เงินเข้า','ลูกค้าโอน','โอนเข้า','ขายได้'];
  const expenseWords=['ซื้อ','จ่าย','สั่ง','ค่า','เติม','โอนให้','จ่ายค่า'];

  if(incomeWords.some(w=>text.includes(w))) return 'income';
  if(expenseWords.some(w=>text.includes(w))) return 'expense';

  return null;
}

function detectCategory(text){
  const t = text.toLowerCase();

  const keywords = {
    'อาหาร': [
      'ข้าว','ก๋วยเตี๋ยว','ส้มตำ','หมูกระทะ','อาหาร',
      'สั่งแกร๊บ','grab','foodpanda','สั่งอาหาร',
      'น้ำ','กาแฟ','ชา','ชาไข่มุก','ชานม','คาเฟ่'
    ],
    'เดินทาง': [
      'grabcar','แกร็บรถ','แท็กซี่','taxi',
      'bts','mrt','รถเมล์','น้ำมัน','เติมน้ำมัน'
    ],
    'สาธารณูปโภค': [
      'ค่าไฟ','ค่าน้ำ','ค่าเน็ต','wifi','อินเทอร์เน็ต'
    ],
    'ช้อปปิ้ง': [
      'shopee','lazada','เสื้อ','รองเท้า','กระเป๋า','ซื้อของ'
    ],
    'สุขภาพ': [
      'หมอ','ยา','คลินิก','โรงพยาบาล','วิตามิน'
    ],
    'บันเทิง': [
      'หนัง','netflix','spotify','เกม'
    ],
    'ขายสินค้า': [
      'ขายของ','ลูกค้าโอน','โอนค่าของ'
    ],
    'เงินเดือน': [
      'เงินเดือน','salary'
    ]
  };

  for(const category in keywords){
    if(keywords[category].some(word=>t.includes(word))){
      return category;
    }
  }

  return 'อื่นๆ';
}

/* ====== Chat Function ====== */

function sendChat(){
  const text=chatInput.value.trim();
  if(!text) return;

  addMessage(text,'user');

  const type=detectType(text);
  const amountMatch=text.match(/\d+(\.\d+)?/);
  const amount=amountMatch?parseFloat(amountMatch[0]):null;

  if(!type || !amount){
    addMessage('กรุณาพิมพ์ เช่น ซื้อข้าว 80 หรือ ลูกค้าโอน 3000','system');
    return;
  }

  const category=detectCategory(text);

  entries.push({
    id:Date.now(),
    type,
    amount,
    category,
    date:new Date().toISOString().slice(0,10),
    desc:text
  });

  save();
  render();
  addMessage(`บันทึกแล้ว (${category})`,'system');
  chatInput.value='';
}

/* ====== Render ====== */

function render(){
  const todayStr=new Date().toISOString().slice(0,10);
  const monthStr=new Date().toISOString().slice(0,7);

  const todayData=entries.filter(e=>e.date===todayStr);
  const monthData=entries.filter(e=>e.date.startsWith(monthStr));

  const todayIncome=todayData.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const todayExpense=todayData.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const monthIncome=monthData.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const monthExpense=monthData.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);

  totalIncome.textContent='฿'+monthIncome.toLocaleString();
  totalExpense.textContent='฿'+monthExpense.toLocaleString();
  totalBalance.textContent='฿'+(monthIncome-monthExpense).toLocaleString();
  todayIncomeSpan = document.getElementById('todayIncome');
  todayExpenseSpan = document.getElementById('todayExpense');
  todayIncomeSpan.textContent='฿'+todayIncome.toLocaleString();
  todayExpenseSpan.textContent='฿'+todayExpense.toLocaleString();

  txList.innerHTML=monthData.map(e=>`
    <div class="tx-item">
      <div>${e.desc}<br><small>${e.category} • ${e.date}</small></div>
      <div>
        <span class="${e.type==='income'?'income':'expense'}">
        ${e.type==='income'?'+':'-'}฿${e.amount.toLocaleString()}
        </span>
      </div>
    </div>
  `).join('');

  if(barChart) barChart.destroy();
  barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{
      labels:['รายรับ','รายจ่าย'],
      datasets:[{
        data:[monthIncome,monthExpense],
        backgroundColor:['#22c55e','#ef4444']
      }]
    }
  });

  const expenseByCategory={};
  monthData.filter(e=>e.type==='expense')
  .forEach(e=>{
    expenseByCategory[e.category]=(expenseByCategory[e.category]||0)+e.amount;
  });

  if(pieChart) pieChart.destroy();
  pieChart=new Chart(document.getElementById('pieChart'),{
    type:'doughnut',
    data:{
      labels:Object.keys(expenseByCategory),
      datasets:[{
        data:Object.values(expenseByCategory),
        backgroundColor:[
          '#6366f1','#f59e0b','#10b981',
          '#ef4444','#3b82f6','#a855f7','#f472b6'
        ]
      }]
    }
  });
}

render();

</script>

</body>
</html>
