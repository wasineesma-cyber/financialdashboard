<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Note — Money Tracker</title>

<style>
:root{
  --bg:#f7f7f9;
  --card:#ffffff;
  --text:#3a3a3a;

  --primary:#ffb7d5;      /* ชมพูเกาหลี */
  --primary-soft:#ffe5f1;

  --income:#7fd6c2;       /* มิ้นต์ */
  --expense:#ff9aa2;      /* ชมพูอ่อน */

  --border:#ececf2;
}

body{
  margin:0;
  font-family:'Kanit',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:480px;
  margin:auto;
  padding:16px;
}

/* Header */
.header{
  text-align:center;
  padding:20px 0 10px;
}

.header h1{
  margin:0;
  font-size:26px;
  font-weight:700;
}

.header p{
  margin:4px 0 0;
  font-size:12px;
  color:#888;
}

/* Card */
.card{
  background:var(--card);
  border-radius:20px;
  padding:18px;
  margin-bottom:14px;
  border:1px solid var(--border);
  box-shadow:0 6px 20px rgba(0,0,0,0.04);
}

/* Summary */
.balance{
  font-size:32px;
  font-weight:700;
  margin:6px 0 10px;
}

.row{
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

.income{color:var(--income); font-weight:600;}
.expense{color:var(--expense); font-weight:600;}

/* Button */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:var(--primary);
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

/* Input */
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  margin-bottom:10px;
  font-size:15px;
}

/* Bottom nav */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-around;
  padding:8px 0;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Don Note</h1>
    <p>simple money tracker</p>
  </div>

  <div class="card">
    <div>ยอดเงินคงเหลือ</div>
    <div class="balance">฿0</div>
    <div class="row">
      <span class="income">รายรับ ฿0</span>
      <span class="expense">รายจ่าย ฿0</span>
    </div>
  </div>

  <div class="card">
    <input placeholder="รายการ เช่น ค่ากาแฟ 60">
    <button class="btn">บันทึก</button>
  </div>

</div>

<div class="nav">
  <div>🏠<br>สรุป</div>
  <div>📊<br>วิเคราะห์</div>
  <div>🗂️<br>หมวด</div>
  <div>📋<br>รายการ</div>
  <div>⚙️<br>ตั้งค่า</div>
</div>

</body>
</html>
