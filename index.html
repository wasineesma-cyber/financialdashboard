<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Note Ultimate</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Kanit',sans-serif;background:#f6f6f8;}
.container{max-width:480px;margin:auto;padding:16px;padding-bottom:120px;}
.card{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px;}
h2{margin:0 0 8px}

.top{display:flex;gap:10px}
.box{flex:1;padding:14px;border-radius:16px;background:#fff}
.expense{background:#fff1f6;color:#ff4f8b}
.income{background:#f2fffb;color:#38b2a6}
.balance{background:#eef2ff;color:#6366f1}
.money{font-size:24px;font-weight:700}

.chat{height:160px;overflow:auto;border-bottom:1px solid #eee;margin-bottom:8px}
.msg{padding:8px 12px;border-radius:14px;margin:6px 0;max-width:80%}
.user{background:#111;color:#fff;margin-left:auto}
.bot{background:#f1f1f5}

input,select,button{
width:100%;padding:12px;border-radius:12px;border:1px solid #eee;margin-top:6px}
button{background:#111;color:#fff;border:none}

.mascot{position:fixed;bottom:90px;left:-80px;font-size:48px;transition:1s linear}
.mascot.run{left:110%}
.speech{
position:fixed;bottom:150px;left:20px;background:#fff;padding:10px 14px;
border-radius:14px;border:1px solid #eee;opacity:0;transition:.4s}
.speech.show{opacity:1}

.level{
position:fixed;top:12px;right:12px;background:#111;color:#fff;
padding:8px 12px;border-radius:12px;font-size:12px;font-weight:700}
</style>
</head>

<body>

<div class="level" id="levelBox">LV.1 นักออม</div>
<div class="mascot" id="mascot">🐻🏺</div>
<div class="speech" id="speech">ดงดงอยู่ข้างเธอ</div>

<div class="container">

<!-- SUMMARY -->
<div class="card">
<h2>สรุป</h2>
<div class="top">
<div class="box expense">รายจ่าย<div id="exp" class="money">฿0</div></div>
<div class="box income">รายรับ<div id="inc" class="money">฿0</div></div>
<div class="box balance">คงเหลือ<div id="bal" class="money">฿0</div></div>
</div>
</div>

<!-- CHAT -->
<div class="card">
<h2>💬 แชตบันทึก</h2>
<div id="chat" class="chat"></div>
<input id="chatInput" placeholder="กาแฟ 60" onkeypress="if(event.key==='Enter')sendChat()">
<button onclick="sendChat()">ส่ง</button>
</div>

<!-- MANUAL -->
<div class="card">
<h2>📝 กรอกเอง</h2>
<input id="desc" placeholder="รายการ">
<input id="amount" type="number" placeholder="จำนวนเงิน">
<select id="type">
<option value="expense">รายจ่าย</option>
<option value="income">รายรับ</option>
</select>
<button onclick="addManual()">บันทึก</button>
</div>

<!-- PIE CHART -->
<div class="card">
<h2>📊 รายรับ / รายจ่าย</h2>
<canvas id="pie"></canvas>
</div>

<!-- SAVING GOAL -->
<div class="card">
<h2>🎯 เป้าการออม</h2>
<input id="goalInput" type="number" placeholder="ตั้งเป้าเงิน">
<button onclick="setGoal()">ตั้งเป้า</button>
<div id="goalText">ยังไม่ได้ตั้ง</div>
<div id="progress"></div>
</div>

</div>

<script>
let data=JSON.parse(localStorage.getItem("donnote")||"[]");
let goal=localStorage.getItem("goal")||0;

const mascot=document.getElementById('mascot');
const speech=document.getElementById('speech');
const levelBox=document.getElementById('levelBox');

function speak(t){
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

function talk(msg){
speech.textContent=msg||["เก่งมาก 🐻","ดงดงภูมิใจ","เราจะรวย!"][Math.floor(Math.random()*3)];
speech.classList.add('show');
setTimeout(()=>speech.classList.remove('show'),2000);
}

function run(){
mascot.classList.remove('run');
void mascot.offsetWidth;
mascot.classList.add('run');
}

function levelUp(){
levelBox.innerText="LV."+ (Math.floor(data.length/5)+1) +" นักออม";
}

function save(){
localStorage.setItem("donnote",JSON.stringify(data));
update();
levelUp();
}

function add(desc,amount,type){
data.push({desc,amount:+amount,type});
save();run();talk();speak("บันทึกแล้ว");
}

function addManual(){
add(desc.value,amount.value,type.value);
desc.value="";amount.value="";
}

function sendChat(){
const txt=chatInput.value;
if(!txt)return;
addMsg(txt,"user");

let amount=(txt.match(/\d+/)||[0])[0];
let type=/เงินเดือน|ขาย/.test(txt)?"income":"expense";

add(txt,amount,type);

addMsg("บันทึกแล้ว 🐻","bot");
chatInput.value="";
}

function addMsg(t,c){
chat.innerHTML+=`<div class="msg ${c}">${t}</div>`;
chat.scrollTop=9999;
}

function setGoal(){
goal=goalInput.value;
localStorage.setItem("goal",goal);
goalText.innerText="เป้า: ฿"+goal;
update();
}

function update(){
let inc=0,exp=0;
data.forEach(d=>d.type=="income"?inc+=d.amount:exp+=d.amount);
let bal=inc-exp;

inc.innerText="฿"+inc;
exp.innerText="฿"+exp;
bal.innerText="฿"+bal;

pie.data.datasets[0].data=[inc,exp];
pie.update();

if(goal>0){
let percent=Math.min(100,Math.floor(bal/goal*100));
progress.innerText="ความคืบหน้า: "+percent+"%";
if(percent>=100) talk("ถึงเป้าแล้ว เก่งที่สุด 🐻✨");
}
}

goalText.innerText=goal?("เป้า: ฿"+goal):"ยังไม่ได้ตั้ง";

const pie=new Chart(document.getElementById('pie'),{
type:'doughnut',
data:{labels:["รายรับ","รายจ่าย"],
datasets:[{data:[0,0],backgroundColor:["#7fd6c2","#ff8fb3"]}]}
});

update();

/* เปลี่ยนหมีตามเวลา */
const h=new Date().getHours();
if(h<12) mascot.textContent="🐻‍❄️🏺";
else mascot.textContent="🐻🏺";
</script>

</body>
</html>
