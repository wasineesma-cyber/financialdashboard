<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เหมียวบัญชี Ultra v4.1</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg: #f0f2f5; --card: rgba(255, 255, 255, 0.85); --text: #1e293b;
    --border: rgba(226, 232, 240, 1); --accent: #6366f1;
    --glass: blur(10px); --income: #10b981; --expense: #ef4444;
}
[data-theme="dark"] {
    --bg: #0f172a; --card: rgba(30, 41, 59, 0.8); --text: #f8fafc;
    --border: rgba(51, 65, 85, 0.5);
}

body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    background-attachment: fixed; min-height: 100vh; transition: 0.3s; margin: 0; padding-bottom: 40px;
}

header {
    backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
    background: var(--card); padding: 15px; text-align: center;
    border-bottom: 1px solid var(--border); sticky; top: 0; z-index: 100;
}

.container { max-width: 500px; margin: auto; padding: 15px; }

.card {
    background: var(--card); backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
    border: 1px solid var(--border); border-radius: 24px;
    padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

.balance-card {
    background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    color: white; border: none;
}

.btn {
    padding: 12px 24px; border: none; border-radius: 16px;
    background: var(--accent); color: white; font-weight: 600; cursor: pointer;
}

.btn-delete {
    background: #fee2e2; color: #ef4444; border: none; 
    border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 0.8rem;
}
.btn-delete:hover { background: #fecaca; }

.chat-box {
    height: 160px; overflow-y: auto; padding: 10px; margin-bottom: 10px;
    display: flex; flex-direction: column; gap: 8px;
}
.msg { padding: 10px 16px; border-radius: 18px; font-size: 0.9rem; max-width: 85%; }
.user { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.system { background: var(--card); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }

input {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 14px; border-radius: 16px; width: 100%; outline: none; box-sizing: border-box;
}

.tx-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 0;
    border-bottom: 1px solid var(--border);
}
.progress-container { background: rgba(0,0,0,0.15); border-radius: 10px; height: 8px; margin: 10px 0; }
.progress-bar { background: #fff; height: 100%; border-radius: 10px; transition: 0.5s; }
</style>
</head>
<body data-theme="light">

<header>
    <div style="display:flex; justify-content: space-between; align-items: center; max-width: 500px; margin: auto;">
        <span style="font-size: 1.5rem; font-weight: 800; color: var(--accent);">🐱 เหมียวบัญชี</span>
        <button onclick="toggleTheme()" style="background:none; border:1px solid var(--border); border-radius:12px; cursor:pointer; padding:5px 10px; color:var(--text)">🌓</button>
    </div>
</header>

<div class="container">
    <div class="card balance-card">
        <small style="opacity: 0.8;">ยอดคงเหลือ (Balance)</small>
        <div id="totalBalance" style="font-size: 2.2rem; font-weight: 800; margin: 5px 0;">฿0</div>
        <div class="progress-container"><div id="budgetBar" class="progress-bar" style="width: 0%"></div></div>
        <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
            <span id="txtIncome">รับ: ฿0</span>
            <span id="txtExpense">จ่าย: ฿0</span>
        </div>
    </div>

    <div class="card">
        <div id="chatBox" class="chat-box"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="chatInput" placeholder="เช่น เงินต้น 5000 หรือ ซื้อข้าว 60" onkeypress="if(event.key==='Enter') sendChat()">
            <button class="btn" onclick="sendChat()">ส่ง</button>
        </div>
    </div>

    <div class="card">
        <h3 style="font-size: 1rem; margin-bottom: 10px;">🕒 รายการล่าสุด (กดลบได้ที่ 🗑️)</h3>
        <div id="txList"></div>
    </div>

    <div class="card">
        <h3 style="font-size: 1rem; margin-bottom: 15px;">📊 สัดส่วนรายจ่าย</h3>
        <canvas id="categoryChart" style="max-height: 250px;"></canvas>
    </div>
    
    <button class="btn" style="width:100%; background:none; border:1px solid var(--border); color:var(--text)" onclick="exportData()">💾 Backup ข้อมูล</button>
</div>

<script>
let entries = JSON.parse(localStorage.getItem('meow_data') || '[]');
let categoryChart;

const icons = { 'อาหาร': '🍱', 'เดินทาง': '⛽', 'ช้อปปิ้ง': '🛍️', 'รายได้': '💰', 'อื่นๆ': '✨' };

function toggleTheme() {
    const b = document.body;
    b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
}

function sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if(!text) return;

    const amountMatch = text.match(/\d+(\.\d+)?/);
    if(!amountMatch) {
        addMessage(text, 'user');
        addMessage("ระบุจำนวนเงินด้วยนะเมี๊ยว!", "system");
        return;
    }

    const amount = parseFloat(amountMatch[0]);
    // ส่วนที่เพิ่มความฉลาด: ตรวจคำศัพท์เงินเริ่มต้น
    const incomeWords = ['รับ','ได้','เงินเข้า','เดือนออก','โบนัส','เงินต้น','มีเงิน','ยกมา','บัญชี'];
    const isIncome = incomeWords.some(w => text.includes(w));
    
    const entry = {
        id: Date.now(),
        desc: text,
        amount: amount,
        type: isIncome ? 'income' : 'expense',
        category: isIncome ? 'รายได้' : detectCategory(text),
        date: new Date().toISOString().slice(0, 10)
    };

    entries.push(entry);
    save();
    addMessage(text, 'user');
    addMessage(`บันทึก ${entry.category} ฿${amount} แล้วเมี๊ยว!`, 'system');
    input.value = "";
    render();
}

function detectCategory(text) {
    const cats = { 'อาหาร': ['ข้าว','น้ำ','กาแฟ','กิน','ขนม'], 'เดินทาง': ['รถ','น้ำมัน','mrt','bts'], 'ช้อปปิ้ง': ['ของ','เสื้อ','shopee'] };
    for(let c in cats) if(cats[c].some(w => text.includes(w))) return c;
    return 'อื่นๆ';
}

function deleteEntry(id) {
    if(confirm('ต้องการลบรายการนี้ใช่ไหมเมี๊ยว?')) {
        entries = entries.filter(e => e.id !== id);
        save();
        render();
    }
}

function save() { localStorage.setItem('meow_data', JSON.stringify(entries)); }

function addMessage(text, type) {
    const box = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function render() {
    const month = new Date().toISOString().slice(0, 7);
    const mData = entries.filter(e => e.date.startsWith(month));
    const inc = mData.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
    const exp = mData.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
    
    document.getElementById('totalBalance').innerText = `฿${(inc - exp).toLocaleString()}`;
    document.getElementById('txtIncome').innerText = `รับ: ฿${inc.toLocaleString()}`;
    document.getElementById('txtExpense').innerText = `จ่าย: ฿${exp.toLocaleString()}`;
    
    const prog = inc > 0 ? (exp / inc) * 100 : 0;
    document.getElementById('budgetBar').style.width = Math.min(prog, 100) + '%';

    document.getElementById('txList').innerHTML = mData.slice().reverse().map(e => `
        <div class="tx-item">
            <div style="font-size: 1.2rem;">${icons[e.category] || '✨'}</div>
            <div style="flex:1">
                <strong>${e.desc}</strong><br>
                <small style="opacity:0.6">${e.date}</small>
            </div>
            <div style="text-align:right">
                <div style="color:var(--${e.type})">${e.type === 'income' ? '+' : '-'}฿${e.amount.toLocaleString()}</div>
                <button class="btn-delete" onclick="deleteEntry(${e.id})">🗑️ ลบ</button>
            </div>
        </div>
    `).join('');

    updateChart(mData);
}

function updateChart(data) {
    const cats = {};
    data.filter(e => e.type === 'expense').forEach(e => cats[e.category] = (cats[e.category] || 0) + e.amount);
    if(categoryChart) categoryChart.destroy();
    const ctx = document.getElementById('categoryChart').getContext('2d');
    categoryChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: Object.keys(cats),
            datasets: [{ data: Object.values(cats), backgroundColor: ['#6366f1', '#f472b6', '#fbbf24', '#34d399', '#60a5fa'] }]
        },
        options: { cutout: '70%', plugins: { legend: { position: 'bottom' } } }
    });
}

function exportData() {
    const blob = new Blob([JSON.stringify(entries)], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'meow_data.json'; a.click();
}

render();
addMessage("ลองพิมพ์ 'เงินต้น 5000' เพื่อเริ่มบันทึกนะเมี๊ยว!", "system");
</script>
</body>
</html>
